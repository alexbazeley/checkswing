mlb_issue_area: antitrust_exemption
relevance_basis: >-
  The Curt Flood Act of 1998 (Public Law 105-297). Amends the Clayton Act to make
  the antitrust laws apply to the employment of major-league baseball players to
  the same extent they apply to other professional athletes, while leaving MLB's
  broader antitrust exemption otherwise intact. The single statutory labor
  carve-out to baseball's exemption.
