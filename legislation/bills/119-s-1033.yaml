relevance_basis: >-
  SAFE Bet Act (Supporting Affordability and Fairness with Every Bet Act).
  Current-congress Senate bill to establish federal minimum standards for legal
  sports betting — covering advertising, affordability checks, and consumer
  protections — in the post-PASPA, state-by-state market. Sponsored by Sen.
  Richard Blumenthal (D-CT); read twice and referred to the Committee on the
  Judiciary on 2025-03-13, pending with no roll-call vote as indexed. The Senate
  companion to H.R.2087 (119th) and the live federal sports-betting-standards
  effort.
