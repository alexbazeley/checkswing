relevance_basis: >-
  SAFE Bet Act of 2025 (Supporting Affordability and Fairness with Every Bet
  Act). Current-congress House bill to set federal minimum standards for legal
  sports betting in the post-PASPA market. Sponsored by Rep. Paul Tonko (D-NY-20);
  referred to the House Committee on Energy and Commerce (and the Committee on
  Natural Resources) on 2025-03-11, pending with no roll-call vote as indexed.
  The House companion to S.1033 (119th) and the live federal sports-betting-
  standards effort.
