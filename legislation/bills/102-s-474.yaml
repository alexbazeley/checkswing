relevance_basis: >-
  Professional and Amateur Sports Protection Act (PASPA). Enacted as Public Law
  102-559 on 1992-10-28, it prohibited most states from authorizing, licensing,
  or operating sports-wagering schemes, effectively freezing legal sports betting
  outside the states (chiefly Nevada) that already permitted it. Sponsored by
  Sen. Dennis DeConcini (D-AZ). PASPA stood until the Supreme Court struck it
  down in Murphy v. NCAA (2018) on Tenth Amendment grounds, opening the
  state-by-state legalization of sports betting. The statutory anchor of the
  sports-betting issue area; the professional sports leagues, including MLB, were
  central advocates for PASPA's original passage.
relevance_source_url: "https://www.congress.gov/bill/102nd-congress/senate-bill/474"
# The Senate passed PASPA on a recorded roll call (the House passed it by voice
# vote, so there is no House roll call to ingest). This is the one foundational
# MLB-relevant law in the index with a recorded vote — note that every archived
# owner donation post-dates the 2000 floor, so the join is structural (which
# owners fund senators who voted on the ban), not a donation-before-vote timing.
