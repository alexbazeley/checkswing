relevance_basis: >-
  Sports Broadcasting Act of 1961. Enacted as Public Law 87-331 on 1961-09-30, it
  amended the antitrust laws to let professional football, baseball, basketball,
  and hockey leagues pool and sell their television broadcast rights collectively
  without antitrust liability — the legal foundation of modern national
  sports-TV economics, including league-wide broadcast deals and the territorial
  structure that produces local blackouts. The statutory anchor of the
  broadcast/IP issue area: the exemption that later blackout-reform bills (the
  FANS Act; the Stop Sports Blackouts Act) seek to condition or narrow.
