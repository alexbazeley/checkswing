relevance_basis: >-
  Consolidated Appropriations Act, 2018 (Public Law 115-141). The legislative
  vehicle that enacted the Save America's Pastime Act: its text was included as a
  provision amending the Fair Labor Standards Act to exempt minor-league baseball
  players from federal minimum-wage and overtime requirements. The bill's
  final-passage roll calls in the House and Senate are the joinable votes for the
  minor-league-pay story.
