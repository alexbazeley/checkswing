mlb_issue_area: sports_betting
relevance_basis: >-
  Sports Wagering Market Integrity Act of 2018. The first major federal response
  after Murphy v. NCAA (2018) struck down PASPA: it would have set federal
  minimum standards for state-legal sports wagering and preserved a federal
  interest in the integrity of professional and amateur contests. Sponsored by
  Sen. Orrin Hatch (R-UT) with Sen. Charles Schumer (D-NY). Read twice and
  referred to the Committee on the Judiciary on 2018-12-19; it received no
  further action and no roll-call vote. Indexed as the bridge between PASPA's
  fall and the current SAFE Bet Act effort.
