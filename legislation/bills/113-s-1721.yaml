relevance_basis: >-
  FANS Act (Furthering Access and Networks for Sports). Sponsored by Sen. Richard
  Blumenthal (D-CT). Would have conditioned the Sports Broadcasting Act's antitrust
  exemption on ending local sports television blackouts and making games available
  online, and would have applied the antitrust laws to Major League Baseball's
  broadcasting. The Committee on the Judiciary held hearings (2014-12-04,
  S.Hrg. 113-847) but the bill received no further action and no roll-call vote.
  The origin of the modern blackout-reform line carried forward as the Stop Sports
  Blackouts Act and For the Fans Act in later congresses.
