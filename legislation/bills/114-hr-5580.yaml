# relevance_basis is a SOURCED FACTUAL statement of why this bill is indexed —
# what it does and the statute it touches — not a characterization of motive.
relevance_basis: >-
  The "Save America's Pastime Act." Amends the Fair Labor Standards Act
  (29 U.S.C. §213) to exempt minor-league baseball players from federal
  minimum-wage and overtime requirements. Died in the 114th Congress; the same
  text was later enacted as a provision of the Consolidated Appropriations Act,
  2018 (carried_by_bill_id below).
relevance_source_url: "https://www.congress.gov/bill/114th-congress/house-bill/5580"
# The standalone bill never received a final-passage roll call; its text became
# law inside the 2018 omnibus, so the joinable votes live on that carrier.
carried_by_bill_id: 115-hr-1625
