notes: |
  Gregory Eugene Johnson (b. 1961/1962) — Chairman of the San Francisco
  Giants since 2019-11-21 (MLB approval as designated "control person").
  Vice Chairman / co-managing member is Rob Dean (son-in-law of late Giants
  principals Harmon and Sue Burns). Greg is also Executive Chairman of
  Franklin Resources (parent of Franklin Templeton); he was CEO of Franklin
  Resources 2005-Feb 2020 (sister Jennifer M. Johnson then took over as
  President & CEO).

  HIGH-RISK DOPPELGANGER CASE. Father Charles B. Johnson is the LARGEST
  individual Giants shareholder (~26%) and is a separately well-documented
  major Republican donor; tracked under his own future slug `johnson-
  charles`. DIFFERENT first name = no name-variant collision with Greg.

  Sister Jennifer M. Johnson (Franklin CEO) and uncle Rupert H. Johnson Jr.
  (Franklin Vice Chair) share the same Franklin employer string; different
  first names protect Greg's variants.

  Strong_signals empty at creation: Franklin Resources is a publicly traded
  company with thousands of employees; cannot be strong. No documented
  private Greg-controlled entity surfaced. Calibrate strong_signals after
  first ingestion if a unique pattern emerges.

  NEEDS-CONFIRMATION: Hillsborough, CA residence is per public-records
  aggregators only; a second Tier 2 source would tighten it. Charles B.
  Johnson owns Carolands Chateau in Hillsborough — a record with "Charles"
  + Hillsborough could plausibly be father's secondary residence, not Greg.
  Different first name = different name-variant scope.

  Doppelganger rule: records with Palm Beach FL anchor are almost certainly
  father Charles, not Greg — but different first name = won't match Greg's
  variants anyway.

