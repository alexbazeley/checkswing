notes: |
  Robert "Bob" Nutting, b. Wheeling, WV, March 29, 1962. Primary residence
  Wheeling, WV. President/CEO of Ogden Newspapers (Wheeling-based family
  chain, ~50+ daily newspapers across multiple states) AND Chairman of
  Pittsburgh Pirates.

  Family was Pirates board member from 1996, took controlling interest from
  Kevin McClatchy in 2007. Bob officially announced as principal owner
  2007-01-12 (was board chairman 2003-2007).

  CRITICAL family-collision risks at Ogden Newspapers (which several Nuttings
  file as employer):
    - Father G. Ogden Nutting (d. 2023-08-25) — was Pirates majority owner
      pre-2007. Pre-2007 records labeled "Ogden Nutting" / "G. Ogden Nutting"
      are him, NOT Bob.
    - Brother William "Bill" Nutting — VP at Ogden Newspapers. "W. Nutting"
      or "William Nutting" records are him.
    - Niece Cameron Nutting Williams — CRO at Ogden Newspapers. Different
      first name, less collision risk.

  name_variants strictly require "Robert" or "Bob" — no first-initial-only
  forms.

  Seven Springs Mountain Resort: family-owned ski resort in PA. Reportedly
  sold in 2021 (verify); pre-2021 filings may use it as employer.

