notes: |
  Joseph C. ("Joe") Pohlad — former Twins executive chair / controlling
  owner. Took over from uncle Jim Pohlad on 2022-11-29; replaced by older
  brother Tom Pohlad on 2025-12-17 after the family called off a 14-month
  sale exploration (announced Oct 2024) and instead brought in three
  minority investor groups (Glick Family Investments, George Hicks group,
  Craig Leipold). The Pohlad family retains majority control.

  Per user direction (Castellini precedent): tenure_end_date = 2025-12-17;
  continue tracking Joe's full federal giving history through the project's
  scope window. Tom Pohlad will get his own slug (`pohlad-tom`) — research
  required before YAML.

  HIGH FAMILY-COLLISION RISK. Multiple Pohlad relatives are business-active
  at the same employer ("Pohlad Companies") in the same Twin Cities metro:
   - Father Robert "Bob" Pohlad (b. 1954, formerly PepsiAmericas CEO).
   - Uncle Jim Pohlad (b. 1953, Twins control person 2009-2022).
   - Uncle Bill Pohlad (b. 1956, River Road Entertainment).
   - Brother Tom Pohlad (CURRENT Twins control person from Dec 2025).
   - Brother Chris Pohlad (VP Asset Management at Pohlad Cos.).
  Name_variants for Joe deliberately strict — require "Joe" or "Joseph";
  no bare "J. Pohlad" or "J Pohlad" forms (would catch Jim).

  Joe became CEO of Go Media / Go Radio (Minneapolis FM Go 96.3 / 95.3) in
  2015 — separate employer string in verifying_signals. Pre-2022 he was EVP
  Brand Strategy & Growth at the Twins.

  Middle initial "C" found via Pohlad Foundation officer directory; full
  middle name not Tier 2-confirmed. Use middle initial. Specific Twin Cities
  suburb of residence is NEEDS-CONFIRMATION; minneapolis, edina, wayzata,
  saint paul listed conservatively in verifying_signals.cities.

