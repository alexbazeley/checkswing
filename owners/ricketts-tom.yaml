  - "Chicago Cubs"
  - "Cubs"
  - "Incapital LLC"
  - "Incapital"
  - "InspereX"
    # Added 2026-05-25 Tier-B calibration. All four below confirmed as Tom
    # via shared street address (531 Laurel Ave, Wilmette IL 60091) on at
