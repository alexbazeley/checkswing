notes: |
  Tom Ricketts is the operating Executive Chairman of the Cubs since the
  Ricketts family's October 2009 purchase from the Tribune Company. Co-founded
  Incapital LLC in 1999; Incapital merged with 280 CapMarkets in July 2021 to
  form InspereX, where Tom remains Founder/Chairman.

  Residence: Wilmette IL since 1997. His sister Laura also lives in Wilmette
  ("less than a mile north" per Crain's). Wilmette + Chicago Cubs alone is a
  2-signal CONFIRMED that could include Laura's records — name variants
  exclude bare "Ricketts" and first-initial-only forms (L./T./P./J./M.) as
  the primary disambiguator.

  Father Joe Ricketts founded TD Ameritrade — that is the family wealth source
  but Tom never worked there. TD Ameritrade is deliberately excluded from
  employers to keep Joe/Pete records out.

  Pete Ricketts (brother, U.S. Senator R-NE) is a federal officeholder with
  his own campaign committees. He is the highest-leakage-risk sibling.
  Laura Ricketts (sister, Cubs co-owner, Wilmette resident) is the second-
  highest-leakage-risk sibling because she shares city + plausibly employer
  ("Chicago Cubs"). Strict first-name name_variants are the firewall.

  Expected calibration-round-1 questions:
    - Are any CONFIRMED records dated before 1999 (pre-Incapital)? What's
      the employer field?
    - Are any CONFIRMED records dated before 2009 (pre-Cubs)? Should be
      Incapital-era.
    - Are any records leaking from siblings due to name-normalization bugs?
    - Should "Incapital" and "InspereX" be promoted to strong_signals after
      a clean audit?

