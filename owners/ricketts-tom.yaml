# Thomas S. Ricketts — Chicago Cubs
# Executive Chairman of the Cubs since the Ricketts family purchased from
# Tribune Co in October 2009. Co-founder/Chairman of Incapital LLC (1999) →
# now InspereX (merged 2021).
#
# CRITICAL — HARDEST SIBLING-COLLISION CASE IN MLB. Six family-collision
# sources (father Joe, mother Marlene, siblings Pete, Laura, Todd) — all of
# whom are also prolific federal donors with conflicting political alignments:
#   - Joe Ricketts (father, TD Ameritrade founder) — major Republican donor
#   - Marlene Ricketts (mother) — major Republican donor
#   - Pete Ricketts (brother, former NE Governor, current U.S. Senator R-NE)
#     — massive Republican donor + own campaign committees
#   - Laura Ricketts (sister, Cubs co-owner) — Democratic donor, LGBT activist
#   - Todd Ricketts (brother, Cubs co-owner) — Republican donor, former
#     RNC Finance Chair
#
# None of those siblings/parents are tracked under THIS slug. If/when added,
# each gets its own owner slug.
#
# Read OWNER_SCHEMA.md before editing. Read GOVERNANCE.md §1.7 before adding entities.

