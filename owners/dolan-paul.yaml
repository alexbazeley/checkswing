notes: |
  Paul J. Dolan (b. 1958-07-07) — MLB-designated "control person" of the
  Cleveland Guardians (then Indians) since 2013-01-10. Tenure track at the
  team: VP/General Counsel 2000–2004; President 2004–2010; Chairman/CEO
  2011–; formal control person 2013–. Father Larry Dolan led the original
  2000 acquisition (~$323M from Richard Jacobs). Resides Chagrin Falls /
  Geauga County, OH. Wife: Karen Dolan.

  David Blitzer holds a ~25–35% minority stake from June 2022 with a
  pre-priced option to acquire controlling interest ~2028. Paul remains
  control person through May 2026.

  HIGH same-family collision risk:
   - Father Lawrence J. ("Larry") Dolan (d. 2025-02-23). Different first
     name; no name-variant collision with Paul.
   - Brother Matthew J. ("Matt") Dolan — Ohio State Senator 2017–2024, 2x US
     Senate primary candidate (2022, 2024). Different first name. He himself
     will appear in FEC under his own candidacy + as a donor; separate slug
     `dolan-matthew` if added.
   - Cousin James L. Dolan (NY MSG / Knicks / Rangers / Cablevision family).
     Different first name and different family branch.

  DOPPELGANGER (pre-emptive negative_signal): Paul E. Dolan, California
  winemaker (Fetzer Vineyards; Bonterra Vineyards), d. 2023-07. Same first
  name. Wine industry employer strings blocked via negative_signals.

  Pre-2000 era: Paul practiced law at Thrasher, Dinsmore & Dolan (Chardon,
  OH; family-named firm). Pre-2000 FEC records may carry that employer.

