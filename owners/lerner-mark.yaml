notes: |
  Mark D. Lerner — Managing Principal Owner of the Washington Nationals
  since 2018-06-14 (MLB ownership meeting transition from his father Ted
  Lerner). Family bought the Nationals from MLB in 2006 ($450M). Ted died
  2023-02-12; no ownership-structure change. Family explored a sale via
  Allen & Co. from April 2022 through Feb 19, 2024, when Mark publicly
  ended the process. Mark fired GM Mike Rizzo and manager Dave Martinez on
  July 6, 2025 under his own Managing Principal Owner letterhead, confirming
  continued operational control. CNBC March 2026 valuations list Lerner
  family ownership.

  Strong signals: "Lerner Enterprises" and "Lerner Corporation" — near-
  uniquely associated with this family in the DC-area FEC universe.

  Tower Companies is a SEPARATE firm (Abramson family), despite past joint
  ventures with Lerner Enterprises. Do NOT use "Tower Companies" as a
  Lerner signal.

  DOPPELGANGER: Dr. Mark D. Lerner — clinical/forensic psychologist in
  Melville, NY (Long Island). Same first/middle initial. Distinguished by
  state (NY vs MD) and occupation. Address-contradiction check in the
  classifier should route most of these to UNCERTAIN; calibrate negative_
  signals after first ingestion if needed.

  Edward L. Cohen, Robert K. Tanenbaum, Annette Lerner, Judy Lenkin Lerner,
  Marla Lerner Tanenbaum, Debra Lerner Cohen are each separate prominent
  individuals — each warrants its own slug if added. Do NOT silently fold
  their giving into Mark's totals (GOVERNANCE.md §1.7).

