# John J. Fisher — Athletics
# Principal owner since 2005-03-30 (MLB unanimous approval). Son of Gap
# founders Don and Doris Fisher. Team currently in Sacramento (2025+) playing
# at Sutter Health Park; new Las Vegas stadium scheduled to open 2028.
#
# "John Fisher" is one of the commonest American names — expect noisy initial
# fetch, strict name_variants required.
#
# Read OWNER_SCHEMA.md before editing. Read GOVERNANCE.md §1.7 before adding entities.

slug: fisher-john
name: John J. Fisher
team: Athletics
role: Principal owner
status: pilot
tenure_start_date: 2005-03-30    # MLB owners' unanimous approval
tenure_end_date:

# Conservative variants. "John Fisher" without middle initial included
# because FEC frequently drops middle initials; the verifying/strong
# signals must compensate.
name_variants:
- "John Fisher"
- "John J. Fisher"
- "John J Fisher"
- "John Joseph Fisher"
- "Fisher, John"
- "Fisher, John J"
- "Fisher, John J."

# "John Fisher" is so common that a lone city+state match (San Francisco/CA)
# corroborates nothing — it swept ~99 federal + 6 CA same-named strangers (a
# TriBike courier, BART staff, a Sidley Austin lawyer, DFJ-VC records) into
# PROBABLE on the city signal alone. This flag makes city_state INSUFFICIENT on
# its own for PROBABLE: such a row stays UNCERTAIN unless a discriminating signal
# (employer/occupation/ZIP) also hits. city_state still counts toward a two-signal
# CONFIRMED, and San Francisco stays a documented city so it does NOT contradict —
# so the real strong-signal giving (Pisces/Sansome + ZIPs 94111/94188) is
# untouched. See change_log 2026-06-06 and OWNER_SCHEMA.md.
city_state_alone_insufficient: true

verifying_signals:
  cities:
    # San Francisco only (Tier 2 confirmed). Marin County hinted in some
    # press but not Tier 2-verified. Kept (NOT removed) so SF records don't trip
    # the address-contradiction rule — the city_state_alone_insufficient flag
    # above is what neutralizes the one-signal PROBABLE leak.
  - "san francisco"
  states:
  - "CA"
  employers:
  - "Athletics"
  - "Oakland Athletics"
  - "Athletics Investment Group"
  - "Gap Inc"
  - "Gap"
  occupations:
  - "owner"
  - "principal"
  - "principal owner"
  - "investor"
  - "self-employed"

strong_signals:
  # Pisces Inc — family office Fisher founded 1992, SF-based. Sansome Partners
  # is his PE firm. Both uniquely tied to him in Tier 2 sources, small
  # headcount, virtually never filed by anyone else.
  employers:
  - "Pisces Inc"
  - "Pisces, Inc"
  - "Sansome Partners"
  # ZIP 94111 (SF Financial District, Pisces office area, 27 documented Fisher
  # filings) and 94188 (SF PO Box, 10 documented Fisher filings) — both
  # surfaced from initial fetch of Pisces-named records. Promoted to strong
  # so Fisher records at these ZIPs auto-CONFIRM even when the employer
  # field is missing / non-Pisces. Cohen-10001 precedent.
  zip_codes:
  - "94111"
  - "94188"

# Anti-pattern: AT LEAST FOUR DIFFERENT "John Fisher"s file from the SF Bay
# area with employers that have no documented connection to John J. Fisher
# (Athletics owner). Identified via Tier-A calibration round 1 (2026-05-24):
#
#   1. John M. Fisher — TRANSPORTATION MANAGER at WSP USA / WSP Inc / Parsons
#      Brinckerhoff (engineering firm). Files small ($70) PAC contributions
#      to WSP USA INC. PAC. Note middle initial M, not J. ~99 records.
#
#   2. A "John Fisher" with occupation REAL ESTATE at Sky Oak Partners and
#      SKS Partners (both SF real-estate firms; same person or two
#      doppelgängers using the same SF zips 94110 + 941103432). $250-$500
#      donations to ActBlue. ~84 records combined.
#
#   3. John H.N. Fisher — VENTURE CAPITAL / MANAGING DIRECTOR at DFJ
#      (Draper Fisher Jurvetson). Co-founder of the VC firm. $3,300-$10,000
#      donations to ActBlue + various Democratic congressional campaigns.
#      ZIP 94118 + 941181804. ~19 records.
#
# John J. Fisher (Athletics) has NO documented connection to any of these
# firms — wealth is from Gap Inc + Pisces (family office) + Sansome (PE)
# + Athletics ownership.
negative_signals:
  employers:
  - "WSP"                         # catches WSP INC, WSP USA
  - "Parsons Brinckerhoff"        # WSP-acquired engineering firm
  - "Sky Oak"                     # catches Sky Oak Partners, Sky Oak LLC
  - "SKS Partners"                # SF real estate doppelgänger
  - "DFJ"                         # catches DFJ, DFJ Growth
  - "Draper Fisher Jurvetson"     # spelled-out form

related_entities: []
# Documented future candidates (do NOT add without approval):
#   - Wife Laura Fisher — sometimes mentioned in press
#   - Siblings Bob Fisher, Robert Fisher (Gap family) — separate slugs if added
#   - Parents Don and Doris Fisher (Gap founders) — historical context only

