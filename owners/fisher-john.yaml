    Tier-B / Tier-C audit pass-through — no additional changes beyond
    the 2026-05-24 Tier-A entry above. Current state: 138 CONFIRMED /
    43 PROBABLE / 1479 UNCERTAIN-open. P/C 0.31. The 43 PROBABLE are
    legitimate one-signal residual after the four doppelgänger
    negative_signal additions; further calibration would require
    individual record-level adjudication (not scalable). Signal review
