notes: |
  John Joseph Fisher (b. 1961-06-01) is the son of Gap founders Don and
  Doris Fisher. Has been Athletics principal owner since MLB's 2005-03-30
  unanimous approval of the Fisher/Wolff group purchase. Lew Wolff was
  managing partner 2005-Nov 2016; Fisher was always majority owner. Wolff
  sold remaining 10% to Fisher in Nov 2016.

  Primary residence: San Francisco, CA. Marin County hinted in some press
  but not Tier 2-verified — not added until calibration evidence.

  Athletics relocation: team is in Sacramento (2025-2027) playing at Sutter
  Health Park; new Las Vegas stadium scheduled to open 2028. Fisher remains
  principal owner throughout. CA filing addresses should continue; NV
  filings possible post-relocation.

  Wealth source: Gap Inc. (family ownership stake; Don and Doris founded
  the company 1969). Pre-2005 filings may use Gap as employer. Gap NOT in
  strong_signals — large public company with many employees.

  Pisces Inc. (family office, founded 1992, SF-based) and Sansome Partners
  (PE firm, founding partner) are Fisher's personal vehicles — strong
  signals.

  "John Fisher" is one of the commonest American names. Expect a noisy
  initial fetch even with CA state filter. Calibration round 1 should
  validate that CONFIRMED records all cluster in SF area + have Pisces /
  Sansome / Athletics employer signals.

  Doppelgänger landscape (Tier-A calibration 2026-05-24): at least four
  different "John Fisher"s file from the SF Bay area with distinct
  employer footprints. See negative_signals block above for documented
  cases. The middle-initial difference (John M vs John J) for the WSP
  engineer is the cleanest disambiguator but we currently rely on
  employer-string negative signals since the schema does not support
  name-based negatives. Do NOT add View Park, Lancaster, Sonoma,
  Sacramento, Laguna Woods, or Lincoln (CA) to verifying_signals.cities
  — those review-queue clusters are additional doppelgängers and are
  correctly held UNCERTAIN by the city/state-outside rule.

