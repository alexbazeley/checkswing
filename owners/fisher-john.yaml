    User-suggested approach (alex): "find Pisces, find addresses, look for
    others at those addresses."
  by: "automated pipeline (alex-directed signal addition)"
- date: 2026-05-24
  change: |
    Tier-A calibration round 1 — added negative_signals.employers for
    four distinct "John Fisher" doppelgängers identified by audit of all
    246 PROBABLE records. Negative signals: WSP, Parsons Brinckerhoff,
    Sky Oak, SKS Partners, DFJ, Draper Fisher Jurvetson.

    Doppelgängers identified:
      1. John M. Fisher — Transportation Manager at WSP USA / WSP Inc /
         Parsons Brinckerhoff (engineering). ~99 records. WSP USA INC. PAC
         is the recipient on most. Middle initial M ≠ J.
      2. Real-estate John Fisher at Sky Oak Partners + SKS Partners. ~84
         records, ZIPs 94110 + 941103432. $250-$500 ActBlue donations.
      3. John H.N. Fisher — DFJ co-founder (Draper Fisher Jurvetson),
         VENTURE CAPITAL / MANAGING DIRECTOR. ~19 records, ZIP 94118 /
         941181804. $3.3k-$10k Democratic donations.

    Measured impact: 138 CONFIRMED (was 147; -9) / 43 PROBABLE (was 246;
    -203) / 1479 UNCERTAIN-open (was 1267; +212). P/C ratio 1.67 → 0.31.
    Major calibration win.

    Important finding — the 9-record drop in CONFIRMED is a CORRECTION,
    not a regression. Those 9 records were previously CONFIRMED because
    they hit Fisher's strong_signals.zip_codes (94111, 941112033,
    941103432, 941885547 — variant ZIP+4 of SF Financial District)
    despite having doppelgänger employer strings (Sky Oak LLC / WSP INC).
    All 9 are now correctly UNCERTAIN:

      - 5 Sky Oak LLC records — Democratic donor (Harris Victory Fund,
        Harris for President, Jimmy Panetta-D) at ZIP 941103432 +
        941885547
      - 4 WSP INC records — Republican donor (Mike Johnson-R speaker
        twice, Larry Hogan-R Maryland twice) at ZIPs 941112033 and 94111

    The party split alone (D vs R donations from same "John Fisher") is
    diagnostic of distinct people. Pre-calibration these were misattributed
    to John J. Fisher (Athletics, predominantly D donor). The 5% CONFIRMED
    drop alarm fired and was investigated; drop is correct.

    View Park / Lancaster / Sonoma / Sacramento / Laguna Woods / Lincoln
    (CA) review-queue clusters left UNCERTAIN — additional doppelgängers
    that the city/state-outside rule correctly catches; adding those
    cities would silently promote ~1,000 doppelgänger records to PROBABLE.

    Notes block updated with the doppelgänger landscape.
  by: "automated pipeline (PR 4 Tier A, maintainer-approved)"
  references:
