- date: 2026-05-22
  change: |
    Added strong_signals.zip_codes [94111, 94188] before first full
    classification. Initial broad fetch of "John Fisher" CA returned ~3,924
    records (FEC common-name penalty), of which 37 had employer matching
    "Pisces" or "Sansome" — these clustered at ZIPs 94111 (27 records, SF
    Financial District) and 94188 (10 records, SF PO Box). Both are Fisher's
