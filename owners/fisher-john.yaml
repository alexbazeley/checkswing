# John J. Fisher — Athletics
# Principal owner since 2005-03-30 (MLB unanimous approval). Son of Gap
# founders Don and Doris Fisher. Team currently in Sacramento (2025+) playing
# at Sutter Health Park; new Las Vegas stadium scheduled to open 2028.
#
# "John Fisher" is one of the commonest American names — expect noisy initial
# fetch, strict name_variants required.
#
# Read OWNER_SCHEMA.md before editing. Read CLAUDE.md §1.7 before adding entities.

slug: fisher-john
name: John J. Fisher
team: Athletics
role: Principal owner
status: pilot
tenure_start_date: 2005-03-30    # MLB owners' unanimous approval
tenure_end_date: null

# Conservative variants. "John Fisher" without middle initial included
# because FEC frequently drops middle initials; the verifying/strong
# signals must compensate.
name_variants:
  - "John Fisher"
  - "John J. Fisher"
  - "John J Fisher"
  - "John Joseph Fisher"
  - "Fisher, John"
  - "Fisher, John J"
  - "Fisher, John J."

verifying_signals:
  cities:
    # San Francisco only (Tier 2 confirmed). Marin County hinted in some
    # press but not Tier 2-verified.
    - "san francisco"
  states:
    - "CA"
  employers:
    - "Athletics"
    - "Oakland Athletics"
    - "Athletics Investment Group"
    - "Gap Inc"
    - "Gap"
  occupations:
    - "owner"
    - "principal"
    - "principal owner"
    - "investor"
    - "self-employed"

strong_signals:
  # Pisces Inc — family office Fisher founded 1992, SF-based. Sansome Partners
  # is his PE firm. Both uniquely tied to him in Tier 2 sources, small
  # headcount, virtually never filed by anyone else.
  employers:
    - "Pisces Inc"
    - "Pisces, Inc"
    - "Sansome Partners"
  # ZIP 94111 (SF Financial District, Pisces office area, 27 documented Fisher
  # filings) and 94188 (SF PO Box, 10 documented Fisher filings) — both
  # surfaced from initial fetch of Pisces-named records. Promoted to strong
  # so Fisher records at these ZIPs auto-CONFIRM even when the employer
  # field is missing / non-Pisces. Cohen-10001 precedent.
  zip_codes:
    - "94111"
    - "94188"

