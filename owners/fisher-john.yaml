  by: "automated pipeline (PR 4 Tier C light pass)"
- date: 2026-06-06
  change: |
    Added `city_state_alone_insufficient: true` to fix a noisy PROBABLE tier.
    Root cause: city_state:san francisco/CA, standing as the SOLE confirming
    signal, promoted every same-named SF "John Fisher" to PROBABLE — a TriBike
    Transport courier ($60), BART employees, a Sidley Austin attorney, Theatre
    Rhinoceros, and DFJ-VC records that evade the spelled-out negative_signals
    via FEC spelling variants ("DRAPER, FISHER & JURVELSON" / "DRAPER FISHER
    JURVET"). For a name this common in a metro this large, city+state alone
    corroborates nothing.

    NOTE — the obvious fix (removing "san francisco" from cities) is WRONG and was
    tried + reverted: it makes every SF record trip the address-contradiction rule
    (city not in documented list), which demotes even the Pisces/ZIP-94111 strong-
    signal rows to UNCERTAIN — nuking the real $3.7M of giving. The city must stay.
    The new classifier flag instead makes a LONE city_state hit insufficient for
    PROBABLE (→ UNCERTAIN) while city_state still counts toward a 2-signal CONFIRMED
    and still prevents contradiction.

    Measured impact (flag on, signals otherwise unchanged):
      - Federal master.db: PROBABLE 99 → 2 (the 97 city-only rows → UNCERTAIN; the
        2 residual are occupation:owner/investor one-signal rows — occupations were
        intentionally KEPT). CONFIRMED 567 (strong-signal rows untouched).
        [required a full FEC --full-refetch first to restore 487 rows of missing
        raw before reclassify could run under the C1 guard.]
      - CA state.db: PROBABLE 6 → 0; CONFIRMED 257 (254 strong + 3 two-signal; the
        2 occupation:investor+city rows demote to PROBABLE).
      - TX state.db: unaffected (no SF dependency; 1 occupation:owner PROBABLE
        survives by design — occupations kept).

    Occupations (owner/investor/self-employed) KEPT this round (maintainer call):
    the city signal was the dominant leak. A follow-up can trim them or evaluate
    making city_state_alone_insufficient the global default for all owners.
  by: "automated pipeline (calibration + classifier hardening, maintainer-approved)"
  references:
  - "data/master.db pre-fix: 569 CONFIRMED / 99 PROBABLE (≈all city_state:san francisco/CA)"

