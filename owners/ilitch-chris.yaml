notes: |
  Christopher Paul Ilitch (b. 1965-06-02). Controlling owner of the Detroit
  Tigers since MLB unanimously approved him 2017-05-18 (succeeding father
  Mike Ilitch, d. 2017-02-10). Also President & CEO of Ilitch Holdings since
  2004 (sister Denise resigned co-presidency that year). Governor/CEO of
  Detroit Red Wings (NHL).

  Strong_signals: "Ilitch Holdings" and "Ilitch Sports + Entertainment" —
  the Ilitch surname is rare in the US and concentrated in Metro Detroit,
  and these are the family-named corporate vehicles. "Detroit Tigers" and
  "Detroit Red Wings" stay in verifying because many team employees would
  also report them. "Little Caesars" is verifying-only (tens of thousands of
  employees across franchisees and corporate).

  CRITICAL — Marian Ilitch firewall: Mother Marian Ilitch (b. 1933) remains
  Chairwoman of Ilitch Holdings but the Ilitch organization has publicly
  stated since the 2010s that Marian has NO operational role in the Tigers,
  a firewall driven by MLB's gambling rules and her ownership of MotorCity
  Casino Hotel + Ocean Casino Resort. Marian is a separately-documented
  major political donor — her records must NOT be folded into Christopher's
  attribution. Different first name = no name-variant collision.

  Aug 2024: Christopher filed for divorce from wife Kelle Lites Ilitch in
  Oakland County, MI. No effect on team control.

  Residence: Bloomfield Hills / Bingham Farms area (Oakland County, MI) is
  the documented family base; specific suburb is NEEDS-CONFIRMATION. Both
  are listed in verifying_signals.cities; refine via calibration.

