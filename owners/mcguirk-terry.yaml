notes: |
  Terence F. ("Terry") McGuirk — Chairman, President & CEO of Atlanta Braves
  Holdings, Inc. (NASDAQ: BATRA / BATRK) and the MLB-designated Control
  Person of the Atlanta Braves. Born ~1951; Middlebury College BA 1973;
  Portsmouth Abbey School. Joined Turner Broadcasting 1972 as account
  executive; ascended via TBS, Turner Sports, Turner Broadcasting CEO
  (1996, succeeding Ted Turner post-TBS/Time Warner merger). Has been
  Chairman of the Atlanta Braves since 2007 (Liberty Media's acquisition
  era). Continued as Chairman after the July 18, 2023 split-off of Atlanta
  Braves Holdings from Liberty Media. Added President & CEO titles after
  Greg Maffei resigned all ABH roles effective 2024-08-31.

  Co-principal with John Malone per user direction (Davis-Simpson-style
  separate slugs). McGuirk has operational + day-to-day voting control;
  Malone has economic + non-routine voting control. Malone's slug
  (`malone-john`) tracks his individual federal political giving — which
  predates and is independent of his Braves affiliation (he's Chairman
  Emeritus of Liberty Media as of Jan 1, 2026, and the dominant
  shareholder across Liberty Broadband / Liberty Global / Charter).

  Pre-2007 (Turner Broadcasting / Time Warner era): McGuirk's documented
  Time Warner-era corporate PAC contributions were to "AOL Time Warner Inc
  Committee to Connect & Inform" — historical context only, not a current
  related_entity.

  Doppelganger watch: Common-ish name. Disambiguators: Atlanta, GA + Braves
  / Turner / Time Warner employer + chairman/CEO/president occupation.
  Other Terry McGuirks documented (JLL real-estate exec, Atlanta-area
  realtor) have different employer profiles.

  NEEDS-CONFIRMATION: McGuirk's specific Atlanta neighborhood/suburb
  (Buckhead plausible per civic profile but not in Tier 2 sources). Use
  "atlanta" generally; refine via calibration if filings cluster.

