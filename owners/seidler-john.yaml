notes: |
  John Seidler (b. 1959) — MLB-approved control person of the Padres since
  February 2025. Eldest of ten Seidler siblings; grandson of Walter O'Malley
  (Dodgers owner). Took the role after his younger brother Peter Seidler
  died 2023-11-14 of complications from aplastic anemia. Eric Kutsenda
  served as interim control person Nov 2023 - Feb 2025 (not tracked
  separately; he was an interim/non-family role).

  Concurrent role: Chairman & CEO of O'Malley Seidler Partners, LLC (the
  family office that manages assets for four generations of the
  O'Malley-Seidler family). Board member of Rawlings Sporting Goods.

  ANTICIPATED TRANSITION: Padres sale agreement to a José E. Feliciano /
  Kwanza Jones-led group was publicly announced 2026-05-02 ($3.9B; new MLB
  record). MLB approval expected at June 2026 owners meetings; target close
  before 2026 All-Star Break (~mid-July 2026). When MLB approves and the
  sale closes, this YAML's tenure_end_date should be updated to the close
  date, and feliciano-jose.yaml's tenure_start_date should be aligned.

  Strong_signal: "O'Malley Seidler Partners" (uniquely-named family-office
  vehicle). Both apostrophe and non-apostrophe forms included to handle FEC
  normalization.

  Doppelganger watch: "John Seidler" is a less crowded name than many; the
  combination of LA-area residence + O'Malley Seidler Partners employer is
  the strong identifier. Other "John Seidler" individuals exist nationally
  but lacking this employer signal they go to UNCERTAIN per project policy.

  Family-collision watch: The Seidler family is large (10 siblings); other
  Seidler family members may file federal donations. Brothers Robert and
  Matthew Seidler are trustees of Peter Seidler's trust; Peter's widow
  Sheel Seidler is in litigation with them. NONE are tracked under this
  slug; each is a separate-slug candidate if added.

  Specific Los Angeles neighborhood / suburb is NEEDS-CONFIRMATION; using
  "los angeles" generally in verifying_signals.cities for now.

