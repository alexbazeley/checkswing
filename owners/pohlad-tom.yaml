notes: |
  Thomas ("Tom") Pohlad (b. ~1980; age 45 at 2025-12-17 press conference) —
  Current MLB-approved controlling owner / executive chair of the Minnesota
  Twins since 2025-12-17. Bob Pohlad's oldest son; brother of Joe Pohlad
  (FORMER Twins exec chair) and Chris Pohlad. Grandson of Carl Pohlad
  (Twins founder-purchaser, d. 2009).

  Career arc: Boston College 2002 → Carousel Motor Group (Twin Cities
  auto-retail) GM 2010-, COO 2010-2019 → PaR Systems CEO Feb 4, 2019 to
  Dec 6, 2022 → Pohlad Companies Executive Chairman until Dec 2025 → Twins
  Executive Chair since 2025-12-17.

  Strong_signals: "PaR Systems" (small private robotics/automation firm,
  Shoreview MN; CEO 2019-2022) and "Carousel Motor Group" (small private
  Twin Cities auto-retail; GM/COO 2010-2019). Both are tenure-specific
  uniquely-identifying employers for Tom. "Pohlad Companies" stays in
  verifying because it's shared across Bob/Jim/Bill/Chris/Joe Pohlad.

  Residence: Wayzata, MN (Hennepin County) primary; confirmed via Camp
  Dudley listing + Minnesota Monthly. Spouse: Lindsay Pohlad; three sons
  Jack/Luke/Alex (minors). The Pohlads are documented as DFL (Democratic)-
  leaning in regional press but specific donor activity is the orchestrator's
  downstream call.

  HIGH FAMILY-COLLISION RISK. Multiple Pohlad relatives are business-active
  at the same employer ("Pohlad Companies") in the same Twin Cities metro.
  Name_variants for Tom strictly require "Tom" or "Thomas" — bare "T.
  Pohlad" or initial-only forms NOT included (would collide with Joe,
  Chris, Bob, Jim, Bill, Carl, Eddie Pohlad, etc.).

  NEEDS-CONFIRMATION: Full middle name (research-suggested "K" NOT confirmed
  in Tier 2 sources — omitted from this YAML). Birth year (~1980 derived
  from age 45 at Dec 2025 press conference).

