# John P. Angelos — Baltimore Orioles (FORMER)
# Former Chairman/CEO and "control person" of the Orioles. Family sold the team
# to David Rubenstein in 2024 (initial closing 2024-03-27 with MLB approval;
# final 60% stake transferred 2024-08-01).
#
# SCOPE: John P. Angelos only. His late father Peter G. Angelos (d. 2024-03-23)
# was a prolific federal donor in his own right and is NOT tracked under this
# slug. Brother Louis Angelos (attorney at Law Offices of Peter Angelos) is
# SEPARATE and NOT tracked under this slug. See `notes` for family-collision
# audit work.
#
# Read OWNER_SCHEMA.md before editing. Read CLAUDE.md §1.7 before adding entities.

slug: angelos-john-p
name: John P. Angelos
team: Baltimore Orioles
role: Chairman and CEO (former)
status: pilot
tenure_start_date: 2020-11-03
tenure_end_date: 2024-08-01

# Conservative name variants. Critically:
#   - "Angelos" alone is NEVER a variant — matches Peter, Louis, Georgia.
#   - "P. Angelos" is excluded — ambiguous with Peter G. Angelos (father).
#   - "L. Angelos" / similar — excluded; ambiguous with brother Louis.
#   - Middle initial "P" included to disambiguate from Peter when full form filed.
name_variants:
  - "John P Angelos"
  - "John P. Angelos"
  - "John Angelos"
  - "Angelos, John"
  - "Angelos, John P"
  - "Angelos, John P."

verifying_signals:
  cities:
    # John's documented residences:
    # - Franklin, TN (suburb of Nashville) — purchased home Sept 2016, where
    #   his wife Margaret Valentine's Nashville music business is based.
    # - Nashville, TN — frequently listed as his city.
    # - Baltimore area — through his Orioles role; family properties exist
    #   but no Tier-2 source affirmatively documents his personal residential
    #   address there.
    - "franklin"
    - "nashville"
    - "baltimore"
  states:
    - "TN"
    - "MD"
  employers:
    # NOT INCLUDED: "Law Offices of Peter G. Angelos" / "Angelos Law" — that
    # is Peter's and Louis's firm. John was a lawyer (J.D., U. Baltimore) but
    # made his career in the Orioles/MASN, not the law firm. Including it
    # here would catastrophically merge Peter's records into John's totals.
    # See negative_signals.
    - "Baltimore Orioles"
    - "Orioles"
    - "Mid-Atlantic Sports Network"
    - "MASN"
  occupations:
    - "owner"
    - "principal owner"
    - "chairman"
    - "chairman and ceo"
    - "ceo"
    - "chief executive officer"
    - "president"
    - "executive vice president"
    - "evp"
    - "coo"
    - "chief operating officer"
    - "executive"

strong_signals:
  # Intentionally empty. "Mid-Atlantic Sports Network" tempting but other MASN
  # executives file it. "Baltimore Orioles" filed by many team employees. No
  # John-specific holding entity documented in Tier-2 sources. Promote only
  # after calibration audit identifies an employer string he uniquely uses.
  employers: []
  zip_codes: []

# CRITICAL anti-pattern: the Law Offices of Peter G. Angelos is the family law
# firm where Peter (deceased 2024) and Louis (brother) practice. John has NEVER
# worked there professionally. Any "John Angelos"-name-matched record filing
# this employer is almost certainly Peter filed under a name variant or a
# different person — route to UNCERTAIN.
negative_signals:
  employers:
    - "Law Offices of Peter G. Angelos"
    - "Law Offices of Peter Angelos"
    - "Law Office of Peter Angelos"
    - "Angelos Law"
    - "Peter Angelos Law"
    - "Angelos & Angelos"

related_entities: []
