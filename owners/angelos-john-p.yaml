notes: |
  CRITICAL — family-name collision risk, particularly severe.

  John P. Angelos's father Peter G. Angelos (d. 2024-03-23) was one of the
  largest Maryland federal political donors of his lifetime, giving heavily
  to Democratic causes (~$272K to Draft Biden Super PAC; millions to the
  Democratic Party per public reporting). Peter's records will appear under
  names including "Peter Angelos", "Peter G. Angelos", "Peter G Angelos",
  "Angelos, Peter", "Angelos, Peter G", potentially "P. Angelos". The chosen
  name_variants exclude "Angelos" alone, "P. Angelos", and any form lacking
  the explicit "John" first name.

  Brother Louis Angelos — younger brother, attorney at the Law Offices of
  Peter Angelos (the family asbestos-litigation firm). Louis is a separate
  federal donor. Excluded by name (no "L. Angelos" or bare "Angelos" variants)
  and by the negative_signals.employers block.

  John's career has been with the Baltimore Orioles (EVP & COO since 1999)
  and Mid-Atlantic Sports Network (president & COO since 2012). He holds a
  J.D. from the University of Baltimore School of Law but did NOT practice
  at the family firm.

  Residence: John lives in Franklin, TN (Nashville suburb, purchased 2016).
  Maintained Baltimore presence through Orioles tenure.

  Tenure dates: John was approved as MLB-recognized control person 2020-11-03
  (vote held Oct 2020). The Rubenstein sale closed in two stages: initial
  closing 2024-03-27 (control transferred, Rubenstein takes ~40%) and final
  closing 2024-08-01 (remaining 60% transferred). tenure_end_date is set to
  2024-08-01 to capture John's full ownership-stake window.

