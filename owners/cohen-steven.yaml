- date: 2026-05-22
  change: |
    Calibration round 1 — four signal changes based on audit of first
    ingestion (run_id 3ea399e7, 2,961 records, 98 CONFIRMED / 936 PROBABLE).
    Approved by alex on the four findings:

    1. Added 'POINT 72' (with space) to verifying_signals.employers.
       Audit found 10 PROBABLE Greenwich records at zip 06831 with this
       employer string filed by Cohen (occupation FINANCE, 2016-2017). The
       existing 'Point72' substring did not match 'POINT 72' because of
       the space. Conservative addition — observed in real FEC filings.

    2. Removed 'new york' from verifying_signals.cities. The city_state
       confirming signal was hitting 910 random NYC Steven Cohens (Court
       Reporter, Retired, etc.) and creating PROBABLE-bucket noise. Real
       Cohen NYC donations are caught via strong_signals.zip_codes instead.
       Records at NYC zips outside Cohen's residence now hit address
       contradiction → UNCERTAIN (the spec-correct treatment of unknown
       same-name donors).

    3. Added '10001' to strong_signals.zip_codes. This is Cohen's NYC
       residence ZIP (Chelsea/NoMad, identified from 4 CONFIRMED records at
       zip 100012163 with employer POINT72). With NYC removed from cities,
       we need this strong signal to still catch Cohen's actual NYC giving.

    4. Added negative_signals.employers block with 'Elliott Management' and
       'Elliott Mgmt'. A different Steven Cohen works at Elliott Mgmt
       (Paul Singer's fund) and lives at Greenwich zips 068312665 and
       068313102. Audit found 6 PROBABLE records (Nikki Haley, Stand For
       America PAC) filed by this doppelgänger. The negative_signals
       classifier rule was added in this round; see VERIFICATION.md update.

    Schema-extension note: OWNER_SCHEMA.md and VERIFICATION.md were
