# Steven A. Cohen — New York Mets
# Phase 1 pilot owner. The worked example for verifying_signals construction.
#
# Read OWNER_SCHEMA.md before editing. Read GOVERNANCE.md §1.7 before adding entities.

slug: cohen-steven
name: Steven A. Cohen
team: New York Mets
role: Principal owner
status: pilot
tenure_start_date: 2020-11-06
tenure_end_date:

name_variants:
- "Steven A Cohen"
- "Steven A. Cohen"
- "Steven Cohen"
- "Steve Cohen"
- "Cohen, Steven"
- "Cohen, Steven A"
- "Cohen, Steven A."

verifying_signals:
  cities:
    # "new york" removed 2026-05-22 after calibration found 910 PROBABLE false
    # positives — random NYC Steven Cohens passed the city_state confirming
    # signal. Real Cohen NYC records are caught instead via strong_signals.zip_codes
    # (10001, his Chelsea/NoMad address ZIP).
  - "greenwich"
  - "stamford"
  states:
  - "CT"
  - "NY"
  employers:
  - "Point72"
  - "POINT 72"                 # added 2026-05-22 — observed filing variant (with space)
  - "S.A.C. Capital"
  - "SAC Capital"
  - "SAC Capital Advisors"
  - "New York Mets"
  - "Sterling Mets"
  occupations:
  - "investor"
  - "owner"
  - "principal"
  - "ceo"
  - "founder"
  - "chairman"
  - "self-employed"

# Unique-enough employer strings that a single match promotes to CONFIRMED.
# Cohen Private Ventures is named after him and only files him.
# Point72 Asset Management is his firm; while many employees work there, the
# strong_signal rule still requires a name match — so this just escalates
# when name + employer both hit.
strong_signals:
  employers:
  - "Cohen Private Ventures"
  - "Point72 Asset Management"
  zip_codes:
    # 10001 — Cohen's NYC residence (Chelsea/NoMad, West 26th Street townhouse).
    # Identified by audit: 4 CONFIRMED records at zip 100012163 with employer
    # POINT72. Promoting to strong_signal lets us catch Cohen's NYC donations
    # while keeping random NYC same-name donors out (since "new york" no longer
    # in verifying_signals.cities — they hit address contradiction → UNCERTAIN).
  - "10001"

# Anti-pattern: a DIFFERENT Steven Cohen works at Elliott Management
# (Paul Singer's hedge fund) and lives at overlapping Greenwich ZIPs
# (068312665, 068313102). Calibration audit identified 6 PROBABLE records at
# these ZIPs filing donations to Republican causes (Nikki Haley, Stand For
# America PAC). Without this anti-pattern, they'd PROBABLE-classify on
# city_state and clog the review queue. Adding the negative employer signal
# routes them to UNCERTAIN with explicit reason.
negative_signals:
  employers:
  - "Elliott Management"
  - "Elliott Mgmt"

related_entities:
  # Alexandra Cohen — spouse and major donor in her own right.
  # CRITICAL: never silently merge her donations into Steve's totals.
  # Reports that aggregate "the Cohens" must explicitly join the two slugs.
- kind: spouse
  slug: cohen-alexandra
  name: Alexandra M. Cohen
  name_variants:
  - "Alexandra Cohen"
  - "Alexandra M Cohen"
  - "Alexandra M. Cohen"
  - "Alex Cohen"
  - "Cohen, Alexandra"
  - "Cohen, Alexandra M"
  relationship_source:
    description: "Steven & Alexandra Cohen Foundation official biography — establishes Alexandra as Steven Cohen's spouse (married 1992) and an independent philanthropist (foundation co-founder and president). Tier 2 (SOURCES.md): entity identification, never a donation-fact source."
    url: "https://www.steveandalex.org/team/alexandra-cohen/"
    accessed: "2026-06-02"
    archive_url: "http://web.archive.org/web/20260311135147/https://www.steveandalex.org/team/alexandra-cohen/"
  verifying_signals:
    cities:
    - "greenwich"
    - "new york"
    states:
    - "CT"
    - "NY"
    employers:
    - "Alexandra and Steven A. Cohen Foundation"
    - "Cohen Foundation"
    - "Steven and Alexandra Cohen Foundation"
    - "Not employed"
    - "Homemaker"
    occupations:
    - "philanthropist"
    - "homemaker"
    - "not employed"
    - "co-founder"
  strong_signals:
    employers:
    - "Steven and Alexandra Cohen Foundation"
    - "Alexandra and Steven A. Cohen Foundation"
    zip_codes: []

  # PAC affiliations to research and confirm in Phase 1. Placeholder structure:
  # - kind: pac
  #   slug: ...
  #   name: ...
  #   committee_id: ""
  #   ownership_link_documented:
  #     description: ""
  #     url: ""
  #     accessed: ""

sources:
- description: "MLB.com — MLB owners approve Mets sale to Steve Cohen (Oct 30, 2020)"
  url: "https://www.mlb.com/news/mets-sale-to-steve-cohen-approved-by-mlb"
  accessed: "2026-05-30"
  archive_url: "http://web.archive.org/web/20250213005104/https://www.mlb.com/news/mets-sale-to-steve-cohen-approved-by-mlb"
- description: "Point72 firm leadership page"
  url: "https://www.point72.com"
  accessed: "2026-05-22"
  archive_url: ""

notes: |
  Cohen has primary residence in Greenwich, CT and a secondary in NYC.
  Filings from 2014–2016 sometimes report employer as "S.A.C. Capital" (the
  predecessor firm wound down following the 2013 insider-trading settlement).
  Post-2014 filings shift to "Point72" or "Point72 Asset Management"; expect both.

  Post-2020 (Mets purchase), some filings may report employer as "New York Mets"
  or "Sterling Mets." Treat as expected.

  The Alexandra Cohen related-entity needs separate primary-source URL population
  in the first Phase 1 ingestion review.

