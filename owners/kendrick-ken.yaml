notes: |
  Primary residence Paradise Valley, AZ. Managing general partner of the
  Diamondbacks since 2004; founding ownership stake since 1995.

  In 2024 (publicly disclosed March 2026), Rob Walton acquired a 10%
  minority stake at $2B valuation. Kendrick remains managing general
  partner and controlling owner. Walton is a separate MLB-relevant principal
  (Denver Broncos NFL owner) and is NOT a related_entity of Kendrick.

  Kendrick is "Jr." His father Earl G. Kendrick Sr. (Princeton WV gas-station
  owner) was pre-modern FEC era and not believed to be a federal donor.
  Records labeled "Earl G. Kendrick" without Jr. cross-checked for AZ
  city/state — pre-1990s WV records should not attribute.

  Spouse Randy Kendrick is an independent major Republican / Koch-network
  donor resident in the same household (Paradise Valley AZ). Her donations
  must be classified against her own signals — see flagged item to create
  kendrick-randy.yaml in a future round. Records under "R. Kendrick" or
  "Randy Kendrick" must NOT be attributed to Ken in the absence of her own
  slug; route to UNCERTAIN until the related_entity is added per GOVERNANCE.md §1.7.

  Datatel Inc. (his founded firm, 1968, higher-ed software) was sold in
  2005 and 2009. Filings pre-1990 may report Datatel as employer; later
  filings unlikely. (User's prompt said "Datatec" — that is incorrect;
  the company is Datatel.)

