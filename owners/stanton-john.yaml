notes: |
  John W. Stanton (b. 1955) — Chairman and Managing Partner of the Seattle
  Mariners since 2016-08-19 (closing of Nintendo majority-stake transfer to
  First Avenue Entertainment LLLP, which Stanton chairs). Stanton was a
  minority owner in the partnership since ~2000; tenure as control person
  starts Aug 2016. Nintendo of America retained a 10% stake and remains a
  minority partner. Spouse: Theresa E. ("Terry") Gillespie.

  Strong_signals: "First Avenue Entertainment" (Mariners-specific LLLP),
  Trilogy entities (small private PE/telecom holding firms founded/owned by
  Stanton), and the defunct Western Wireless / VoiceStream Wireless
  employers (1990s-early 2000s telecom — extremely identifying for that
  era).

  Pre-emptive negative_signal: John Stanton (journalist, formerly BuzzFeed
  Washington Bureau Chief; DC/New Orleans-based; X handle @dcbigjohn).
  Different distinct individual. BuzzFeed / BuzzFeed News / CongressDaily
  blocked. Academic doppelganger (John Stanton, St. Joseph's University
  food marketing professor) left for calibration if PA-based filings appear.

  Local-level political-spend density: Mariners-linked giving surfaced in
  2025 Seattle mayor's race coverage (Post Alley). Federal donations remain
  in scope; state/local are not (CHARTER, §6).

