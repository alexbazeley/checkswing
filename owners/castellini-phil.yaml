notes: |
  Phillip J. ("Phil") Castellini — Current MLB-approved control person of
  the Cincinnati Reds since 2026-02-12 (MLB approval; Fox19 reporting).
  Son of Robert H. "Bob" Castellini (FORMER Reds principal owner; tracked
  under `castellini-bob`). Bob's group bought the Reds in 2006; Phil has
  been a fixture in Reds front-office leadership since (President & COO
  through 2024; promoted to President & CEO July 2024; control-person
  transfer Feb 2026).

  Concurrent role: President of Merchants Cold Storage (Walton, KY) since
  1993. Merchants Cold Storage is a Castellini-family-owned cold-storage
  subsidiary. "Merchants Cold Storage" is the strongest unique signal for
  Phil — predates the Reds purchase, less common in FEC than "Cincinnati
  Reds" or "Castellini Group."

  Strong_signal note: "Castellini Group" and "Castellini Company" are also
  in father Bob's strong_signals. The classifier runs per-slug, so
  per-record attribution flows to whichever slug's name_variants the
  record matches. Bob's variants are "Robert"/"Bob"; Phil's are
  "Phillip"/"Phil" — different first names protect from cross-attribution.

  Residence: Cincinnati / Indian Hill area. Hyde Park is suggestive (per
  the family's "Castellini Preserve" Hillside Trust parcel) but not
  directly confirmed for Phil's primary residence — listing both
  conservatively in verifying_signals.cities.

  Walton, KY in verifying_signals.cities/states for Merchants Cold Storage
  employer-address filings. The Cincinnati metro spans the OH/KY border,
  so filings may show either.

  DOPPELGANGER WATCH: "Phil Castellini" is moderately uncommon. Pre-emptive
  negative_signals.employers (financial-advisor doppelganger employers
  added to Bob's YAML in May 2022 calibration: UBS PAINE WEBBER, Sena
  Weller Rohs & Williams, Wells Fargo Advisors). These may or may not
  apply to Phil; will be calibrated after first ingestion.

  SPOUSE FLAG: Britt Castellini is publicly documented as politically
  active (co-hosted Oct 2022 KY-04 Democratic fundraiser per research).
  She is NOT added as related_entity here per GOVERNANCE.md §1.7 — orchestrator-
  level decision needed before adding as `castellini-britt` slug.

  NEEDS-CONFIRMATION: Phil's birth date, children's names, sibling names,
  exact Castellini Group officer title, specific Hyde Park / Indian Hill
  residence.

