notes: |
  Edward Samuel Rogers III (b. 1969-06-22, Toronto). Eldest son of late
  Ted Rogers (founder of Rogers Communications, d. 2008) and late Loretta
  Robinson Rogers (d. 2022). Spouse: Suzanne Kolev Rogers. Three children:
  Chloé, Edward, Jack.

  Current titles (May 2026):
   - Executive Chair, Rogers Communications Inc. (since 2024-08-14)
   - Chair, Rogers Control Trust (holds ~97.52% of Class A Voting Shares of
     Rogers Communications)
   - Chair, Rogers Bank
   - Chairman, Rogers Blue Jays Baseball Partnership
   - Director, MLSE (post-2025 Rogers acquisition of additional 37.5%
     bringing Rogers total to 75%)

  Citizenship / residence: Canadian. Toronto-based. No documented US
  residence or US dual citizenship in Tier 2 sources surveyed (absence of
  evidence; needs-confirmation if a US-address record ever surfaces).
  Limited US business history: worked at Comcast Corporation in
  Philadelphia 1992-1994 (entry-level / operational roles, ~2.5 years).
  No documented US federal political activity (no donations, no PAC
  affiliations, no lobbying registration).

  RATIONALE FOR PAUSED STATUS (not ingested):
  Non-US-citizens are barred from federal political contributions by
  52 U.S.C. § 30121. Edward Rogers III's expected FEC yield is near zero.
  Doppelganger contamination risk is high (Ed Rogers of BGR Group in DC is
  a major Republican-aligned donor — see negative_signals). Ingestion
  under these conditions would produce false-positive UNCERTAIN pile
  without meaningful CONFIRMED records, wasting calibration cycles. A
  documented paused placeholder lets the registry honestly reflect the
  Blue Jays' principal ownership while explaining the structural FEC
  scope gap.

  Charter-level note: MLB teams under non-US-citizen owner control have
  intentionally limited or zero FEC coverage as a structural feature of
  the federal-only scope. As of 2026, the Blue Jays are the only MLB team
  in this category. Consider documenting this class in CHARTER.md or
  catalog/SCOPE_NOTES.md in a future session.

  Doppelganger watch:
   - Edward M. ("Ed") Rogers Jr. — Founding Partner BGR Group, Washington
     DC. Reagan / Bush 41 White House alum. ~$18K to candidates in 2024
     cycle. By far the most common confounder. Pre-emptive negative_signals
     for BGR Group / Barbour Griffith Rogers.
   - Other "Edward Rogers" / "Ed Rogers" donors are common name matches.
   - Edward S. Rogers Sr. (Edward III's grandfather, d. 1939) — pre-FEC.
   - Edward S. Rogers Jr. (Edward III's father / Ted Rogers, d. 2008) —
     Canadian, no documented US donations.

  Note on tenure_start_date: 2024-08-14 captures his appointment as
  Executive Chair of Rogers Communications (per unanimous board vote in
  Calgary). His role as Chairman of Rogers Blue Jays Baseball Partnership
  predates this; precise start date for that title not documented in
  Tier 2 sources surveyed.

