# Edward S. Rogers III — Toronto Blue Jays
# Executive Chair of Rogers Communications Inc. (since 2024-08-14); Chair of
# the Rogers Control Trust (which holds ~97.52% of Rogers Communications
# Class A voting shares); Chairman of Rogers Blue Jays Baseball Partnership.
# Rogers Communications wholly owns the Blue Jays.
#
# STATUS: paused — NOT INGESTED.
#
# Per user direction (special-case batch decision): this is a documented
# placeholder slug for registry completeness. NOT a pilot.
#
# Rationale:
#   - Edward Rogers III is a Canadian citizen, lives in Toronto, has no
#     documented US residence or US dual citizenship.
#   - 52 U.S.C. § 30121 bars federal political contributions by non-US-
#     citizens (other than lawful permanent residents).
#   - No Rogers Communications-affiliated FEC PAC exists (the two "Rogers"
#     PACs in the FEC database are unrelated: Rogers Group Inc. is a
#     Nashville, TN aggregates company; Team Rogers is the Mike Rogers MI
#     Senate joint fundraising committee).
#   - "Ed Rogers" / "Edward Rogers" is a high-confounder name in US
#     politics (DC lobbyist Ed Rogers of BGR Group, etc.).
#   - Expected true-positive FEC yield: near zero; expected false-positive
#     rate: high.
#
# If circumstances change (e.g., Rogers III gets dual citizenship, a Rogers
# Communications USA PAC is registered, or US-resident Rogers family
# members surface), re-activate by changing status to pilot and running
# ingestion.
#
# Read OWNER_SCHEMA.md before editing. Read CLAUDE.md §1.7 before adding entities.

