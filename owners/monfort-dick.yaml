notes: |
  Richard L. ("Dick") Monfort (b. 1954) — Owner / Managing General Partner /
  Chairman / CEO of the Colorado Rockies. Family acquired controlling stake
  from Jerry McMorris in 2005. Dick became Chairman/CEO in 2011 (succeeded
  brother Charlie). Primary residence: Denver, CO (McGregor Square
  residences adjacent to Coors Field). Historical/family base: Greeley, CO
  (where brother Charlie primarily resides and the family meatpacking
  business was headquartered).

  Family meatpacking background: Monfort of Colorado (founded by father
  Kenneth Monfort) was acquired by ConAgra in 1987; Dick was president
  1987–1991 and CEO of ConAgra Red Meats 1991–1995. Currently co-founded
  Montera Cattle Co. (1996–). Indian Wells, CA — owns Hyatt Regency Indian
  Wells Resort & Spa (business address, not residence per Tier 2).

  Strong_signal "West Lot LLC" — Westword and Denver Gazette both name Dick
  as principal of West Lot LLC (developer of McGregor Square). Sufficiently
  unique that a single match promotes to CONFIRMED.

  April 2026 transaction: Penner Sports Group (Greg Penner / Carrie Walton
  Penner of Denver Broncos) acquired 40% minority stake at $1.68B valuation.
  Dick remains Chairman/CEO; Charlie remains GP; Walker remains team
  president. Penners have no day-to-day involvement.

  No active doppelgänger. The "Other Dick Monfort" reference in cattle-industry
  trade press (Calf News) is a profile of an older deceased relative of our
  Dick Monfort who shared the name — not a living donor and not in the FEC
  2000+ window in any meaningful way (clarified by alex 2026-05-25).

  ZIP-to-city mapping note: ZIP 80615 spans both Greeley and Eaton city
  labels in the USPS database, and FEC clerks fill it inconsistently as
  either "GREELEY" or "EATON". Both cities are in verifying_signals.cities;
  records at 80615 with employer "Colorado Rockies" + occupation "Owner/CEO"
  are unambiguously Dick. Calibration round 1 audit (2026-05-25) inspected
  all 16 EATON-labeled UNCERTAIN records and confirmed the pattern.

