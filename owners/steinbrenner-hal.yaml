# Harold Z. Steinbrenner — New York Yankees
# Phase 1.5 pilot. Managing General Partner / Chairperson of Yankee Global
# Enterprises, LLC. Took day-to-day control 2008-11-20 (MLB approval); board
# chair of YGE since 2007.
#
# SCOPE: Hal only. His siblings (Jennifer Steinbrenner Swindal, Jessica
# Steinbrenner, late brother Hank) and parents (the late George and Joan
# Steinbrenner) file their own donations separately and are NOT tracked under
# this slug — see notes for the anticipated family-collision audit work.
#
# Read OWNER_SCHEMA.md before editing. Read GOVERNANCE.md §1.7 before adding entities.

slug: steinbrenner-hal
name: Harold Z. Steinbrenner
team: New York Yankees
role: Principal owner
status: pilot
tenure_start_date: 2008-11-20
tenure_end_date:
family_tenure_start_date: 1973-01-03    # George Steinbrenner-led group acquired Yankees from CBS

# Conservative name variants. Critically:
#   - "Steinbrenner" alone is NEVER a variant — it matches every family member.
#   - "H. Steinbrenner" is excluded — ambiguous with brother Hank.
#   - Middle initial "Z" included to maximize disambiguation when filed in full.
#   - Both "first last" and "last, first" forms included; FEC contributor-name
#     field flips between the two depending on filer.
name_variants:
- "Harold Z Steinbrenner"
- "Harold Z. Steinbrenner"
- "Harold Steinbrenner"
- "Hal Steinbrenner"
- "Steinbrenner, Harold"
- "Steinbrenner, Harold Z"
- "Steinbrenner, Harold Z."
- "Steinbrenner, Hal"

verifying_signals:
  cities:
    # Tampa is Hal's documented home base — Davis Islands (114 Martinique Ave,
    # sold 2017–2020), Sunset Park, Yankees Tampa offices, Boys & Girls Club
    # of Tampa Bay board. No Tier-2 source affirmatively documents a current
    # NYC residence; if calibration finds clearly-Hal NYC filings, add NYC /
    # NY with a change_log entry.
  - "tampa"
  states:
  - "FL"
  employers:
    # Hal's documented affiliations (Tier 2):
    # - Yankee Global Enterprises (YGE) — the LLC that owns the Yankees, of
    #   which he is chairman & managing GP.
    # - New York Yankees — likely how the team is reported on filings.
    # - Steinbrenner Hotel Properties — Hal is chairman & CEO (SOWF board bio).
    # These strings are NOT unique to Hal (other Yankees executives may file
    # "New York Yankees" as employer) — they live here in verifying_signals,
    # requiring a SECOND confirming signal for CONFIRMED.
  - "Yankee Global Enterprises"
  - "Yankee Global"
  - "New York Yankees"
  - "NY Yankees"
  - "Yankees"
  - "Steinbrenner Hotel Properties"
  occupations:
  - "managing general partner"
  - "general partner"
  - "managing partner"
  - "partner"
  - "owner"
  - "principal owner"
  - "chairman"
  - "chairperson"
  - "co-chairperson"
  - "ceo"
  - "businessman"

strong_signals:
  # Intentionally empty at creation. "Yankee Global Enterprises" and
  # "Steinbrenner Hotel Properties" are tempting (both Hal-led) but other
  # employees may file these as employer too. "Martinique Holdings, Inc."
  # is Hal's personal ownership-stake holding company per the official
  # Yankees front-office page (named after his former Davis Islands address),
  # but it's unlikely he files his personal donations reporting it as employer.
  # Promote to strong_signals only when calibration shows zero false positives.
  employers: []
  zip_codes: []

# No negative_signals at creation. The family-name collisions are addressed
# by strict name normalization — Hal's variants don't include George, Hank,
# Jennifer, or Jessica. Audit will catch any leakage and tighten.

related_entities: []
# Per Phase 1.5 registry hint and user direction:
# - Siblings (Jennifer, Jessica) have independent donation histories. Each
#   gets its own slug with its own YAML if/when added — NOT a related_entity
#   under Hal.
# - Spouse Christina Steinbrenner is not added — no Tier 2 source on her
#   FEC activity researched yet.
# - George (deceased 2010) and Joan (deceased 2018) Steinbrenner gave heavily
#   pre-2010 but are out of scope (deceased, no longer a tracked principal).

