notes: |
  CRITICAL — family-name collision risk. Hal is one of four Steinbrenner
  siblings (Hank, Jessica, Jennifer Swindal). None of those siblings are
  tracked under this slug. Strict name normalization (no "Steinbrenner" alone
  variant; no "H. Steinbrenner" variant; explicit "Harold/Hal" requirement)
  is the primary disambiguator.

  Hal's father George M. Steinbrenner III was a prolific federal donor
  through 2010. Pre-2010 records named "George Steinbrenner" / "George M.
  Steinbrenner" must NOT match Hal's variants. Strict matching should handle
  this naturally; if any leak, that is a name-normalization bug.

  Hal's residence is documented as Tampa, FL. He sold 114 Martinique Avenue
  around 2017–2020 and the Sunset Park home as well. Current-residence ZIP
  is unknown; let the data tell us. NYC residence not affirmatively documented
  in Tier 2 sources — if calibration finds clearly-Hal NYC filings (employer
  = Yankee Global Enterprises with NYC ZIPs), add NYC / NY then with a
  change_log entry.

  Hal's personal ownership-stake holding company is "Martinique Holdings,
  Inc." (named after the former Davis Islands street). If "Martinique
  Holdings" appears as an FEC employer string on a Hal-name-matched record,
  it is strongly indicative — consider promoting to strong_signals after
  calibration audit.

  Expected calibration-round-1 questions:
    - Are NYC filings appearing? If so, add NY/NYC.
    - Is "Martinique Holdings" appearing as employer? If so, promote to
      strong_signals.
    - Is the doppelgänger landscape clean, or are sibling records leaking?

