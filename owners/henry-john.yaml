# John W. Henry — Boston Red Sox
# Phase 1.5 pilot. Multi-state (FL primary / MA secondary) + multi-entity setup
# (Fenway Sports Group, John W. Henry & Company, Boston Globe, Liverpool FC).
# Expect a noisier PROBABLE bucket than Cohen — see notes.
#
# Read OWNER_SCHEMA.md before editing. Read CLAUDE.md §1.7 before adding entities.

slug: henry-john
name: John W. Henry
team: Boston Red Sox
role: Principal owner
status: pilot
tenure_start_date: 2002-02-27   # Sale completed (MLB-approved Jan 16, 2002)
tenure_end_date:

name_variants:
- "John W. Henry"
- "John W Henry"
- "John William Henry"
- "John William Henry II"
- "John Henry"
- "Henry, John W"
- "Henry, John W."
- "Henry, John"

verifying_signals:
  cities:
    # Primary: Boca Raton FL (CommonWealth Beacon — FL driver's license, FL
    # voter reg, FL homestead exemption — dispositive of legal residence).
    # Secondary: Brookline MA (Cottage St mansion purchased from Frank McCourt
    # in 2007; Brookline is its own municipality).
    # "boston" added in calibration round 1 — audit found real Henry filings
    # at city=BOSTON with JWH employer + Boca Raton signal context (he files
    # from his Globe office sometimes).
  - "boca raton"
  - "brookline"
  - "boston"
  states:
  - "FL"
  - "MA"
  employers:
    # John W. Henry & Company variants — his original commodities trading
    # firm, founded 1981 in Boca Raton.
    # NOTE: With the calibration round 1 classifier fix (period stripping in
    # _norm), strings here will match record employers regardless of period
    # placement. "John W. Henry and Company" now matches "JOHN W HENRY AND
    # COMPANY INC".
  - "John W. Henry & Company"
  - "John W. Henry & Co"
  - "John W. Henry and Company"
  - "John W. Henry and Co"             # added 2026-05-22 — caught
  - "John W. Henry Company"            # added 2026-05-22 — variant without "and"/&
  - "J.W. Henry & Co"
    # Fenway Sports Group — current sports/media holding co.
  - "Fenway Sports Group"
  - "New England Sports Ventures"
    # Team / property names.
  - "Boston Red Sox"
  - "Boston Globe"
  - "Liverpool Football Club"
  occupations:
  - "principal"
  - "principal owner"
  - "owner"
  - "chairman"
  - "founder"
  - "investor"
  - "investment manager"
  - "publisher"
  - "self-employed"

strong_signals:
  # "John W. Henry & Company" and its short forms are literally named after
  # him — high confidence. "JWH" is the firm's industry-standard abbreviation
  # (per FIA Futures Hall of Fame); promote because it would only appear from
  # him or a JWH employee, and the typical JWH employee count was tiny.
  # Fenway Sports Group is NOT a strong signal — too many FSG employees could
  # file it. Same with Red Sox / Globe / Liverpool. Per Cohen precedent.
  employers:
  - "JWH"
  zip_codes:
    # 33496 = Le Lac gated community Boca Raton (documented Tier 2
    # residence). Added 2026-05-25 Tier-B calibration; narrow gated-
    # community ZIP minimizes doppelgänger risk. 33431 (broader east Boca
    # Raton ZIP) deliberately NOT promoted — name_variants include bare
    # "John Henry" which is one of the commonest American names, and
    # multiple non-Henry John Henrys could live in the broader 33431
    # cluster.
  - "33496"

negative_signals:
  # Boston-area tech employee John Henry at CarGurus (auto-shopping site,
  # Cambridge MA HQ). 1 record observed: HENRY, JOHN / CARGURUS, INC. /
  # SALES / $50 ActBlue 2019. Sales-rep profile is incompatible with John
  # W. Henry the FSG owner. Added 2026-05-25 Tier-B calibration as defense-
  # in-depth against future CarGurus filings.
  employers:
  - "CarGurus"

related_entities: []
# Linda Pizzuti Henry (spouse, CEO Boston Globe Media; chair John W. Henry
# Family Foundation; married 2009) is a documented future related_entity
# candidate. NOT added per user instruction (principals only this round).
# Source for future use: bostonglobemedia.com/people/linda-henry/.

