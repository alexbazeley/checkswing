notes: |
  Henry's primary residence is Boca Raton, FL (FL driver's license, FL voter
  registration, FL homestead exemption — CommonWealth Beacon dispositive).
  Secondary residence is a 35,000+ sq ft mansion off Cottage St in Brookline,
  MA, purchased from Frank McCourt in 2007 and rebuilt. Expect FEC filings
  from BOTH states.

  Pre-2011 filings: employer most likely "John W. Henry & Company" or "JWH"
  (Boca Raton HQ). Post-2011: New England Sports Ventures was renamed Fenway
  Sports Group in March 2011 — treat both "NESV" and "FSG" as expected
  variants. Boston Globe acquired Oct 2013; expect Globe employer string
  post-2013.

  KNOWN CROSS-REFERENCE (not primary source — for sanity-check only): per
  CommonWealth Beacon citing OpenSecrets, Henry's reported federal donations
  totaled ~$885K between 1997–2004, ~96% to Democratic umbrella groups, with
  little reported activity since. This is an OpenSecrets aggregate (Tier 3);
  the FEC primary records are the ground truth. Order-of-magnitude check only.

  "John Henry" is one of the commonest American names (folklore figure plus
  multiple historical and contemporary politicians). Expect doppelgänger
  noise. No specific same-name donor identified at creation; defer
  negative_signals population to post-first-ingestion calibration audit.

change_log:
- date: 2026-05-22
  change: |
    Created during Phase 1.5 research. Tier 2 sources: MLB.com front office,
    Fenway Sports Group leadership page, MIT Sloan Sports Analytics speaker
    bio, ESPN 2002 purchase article, FIA Futures Hall of Fame, CommonWealth
    Beacon residence article, Boston.com 2013 profile.

    Architectural notes for calibration:
      - cities = [boca raton, brookline] (NOT "boston"). Calibration may add.
      - strong_signals = [JWH only]. The longer forms ("John W. Henry & Company"
        etc.) stay in verifying_signals because Henry's firm did employ analysts
        who might file the full firm name. JWH is the industry abbreviation
        almost exclusively used in the small set of people closely associated
        with the firm.
      - Anticipate noisy PROBABLE bucket (common name, two states, multi-entity).
  by: "claude-code-research (orchestrated by alex)"
  references:
  - "/tmp/henry-john-research.md (session-local research file)"
- date: 2026-05-22
  change: |
    Calibration round 1 (run_id dbcd04e1): the first ingestion produced
    only 4 CONFIRMED — far below the expected ~$885K of historical giving.
    Audit traced the gap to two issues:

    (1) Classifier _norm() didn't strip periods, so signal "John W. Henry
        and Company" did NOT substring-match record "JOHN W HENRY AND COMPANY
        INC". This was fixed globally in scripts/resolve_entities.py (see
        PROVENANCE_LOG SCHEMA_MIGRATION entry).

    (2) Two employer-string variants were missing from this YAML:
        "John W. Henry and Co" (catches "JOHN W HENRY AND CO" filings,
        common in early 2000s) and "John W. Henry Company" (catches
        "JOHN W HENRY COMPANY" without "and"/&, also observed). Added.

    (3) "boston" added to cities. Audit identified real Henry filings with
        city=BOSTON (e.g., $50K to Boston Host Committee 2004 with JWH
        employer). Adding "boston" lets these promote to CONFIRMED. Risk:
        Boston is a populous city; other "John Henry"s there might
        previously-UNCERTAIN now become PROBABLE. Mitigated because the
        JWH strong_signal still requires that for CONFIRMED, and stand-alone
        city_state will only get them to PROBABLE.

    Approved by alex.
  by: "claude-code-session (calibration round 1)"
- date: 2026-05-25
  change: |
    Tier-B calibration round 2 — added strong_signals.zip_codes:
    ["33496"] (Le Lac gated community per documented Tier 2) and a
    new negative_signals.employers block with "CarGurus".

    Audit (5 PROBABLE inspected, sample of 247 UNCERTAIN-open
    reviewed):

    4 of 5 PROBABLE records at Boca Raton 33431/33496 are John W.
    Henry with the John W. Henry & Co company name appearing in the
    OCCUPATION field (instead of employer): "JOHN W HENRY COMPANIES",
    "JOHN W HENRY & CO", "JOHN W HENRY AND CO". The classifier
    matches occupation-field against vs_occupations only, so company
    names in that field don't trigger employer matches. Adding 33496
    promotes the 1 PROBABLE record there to CONFIRMED via strong-zip
    (the 3 PROBABLE at 33431 stay PROBABLE — 33431 is broader and
    name_variants include bare "John Henry" which over-confirms).

    1 PROBABLE at Boston 02113 is a distinct doppelgänger: "HENRY,
    JOHN / CARGURUS, INC. / SALES" $50 ActBlue. Added "CarGurus" to
    a new negative_signals.employers block. Currently the record is
    PROBABLE (Boston is in cities); the negative_signal demotes it
    to UNCERTAIN.

    247 UNCERTAIN-open records (Holyoke / Weston / Milton MA, plus
    Altamonte Springs / Naples / Pierson / Winter Park / Milton /
    Venice FL) are left UNCERTAIN — most are different John Henrys
    per the YAML's anticipated common-name doppelgänger pattern.
    Adding city expansions would over-promote.

    Pre-cal: 14 CONFIRMED / 5 PROBABLE / 247 UNCERTAIN-open. P/C 0.36.
    Predicted post-cal: ~15 CONFIRMED / ~3 PROBABLE / ~247 UNCERTAIN
    (1 CarGurus PROBABLE → UNCERTAIN). P/C ~0.20.
  by: "claude-code-session (PR 4 Tier B, approved by alex)"
  references:
  - "data/master.db pre-calibration: 14 CONFIRMED / 5 PROBABLE / 247 UNCERTAIN-open"

