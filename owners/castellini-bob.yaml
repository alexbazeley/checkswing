verifying_signals:
  cities:
    # Cincinnati Chamber bio places him "in Cincinnati"; aggregator sources
    # (Tier 3 only) document Indian Hill as the specific suburb.
  - "cincinnati"
  - "indian hill"
    # Calibration round 1 (2026-05-22): 3 UNCERTAIN records had city
    # "CINCINATTI" (typo for Cincinnati). Adding the misspelling explicitly.
    # Also 3 UNCERTAIN records had city "THE VILLAGE OF IND" (truncated
    # "Village of Indian Hill" — Indian Hill's official municipality name).
  - "cincinatti"
  - "the village of ind"
  - "village of indian hill"
  states:
  - "OH"
  employers:
    # Castellini Group of Companies — family produce/distribution business
    # founded 1896, Cincinnati HQ. Bob has chaired since 1992. Confirmed by
    # Cincinnati Chamber Great Living Cincinnatian profile and theSnack.net
    # industry trade reporting.
  - "Castellini Group of Companies"
  - "Castellini Co"
  - "Castellini Companies"
    # Reds employer string — observed pattern for sitting owners.
  - "Cincinnati Reds"
  occupations:
  - "chairman"
  - "owner"
  - "principal"
  - "ceo"
  - "president"
  - "investor"
  - "executive"

strong_signals:
  # "Castellini Group" and "Castellini Company" are named after the family
  # and are the corporate vehicles he chairs. Conservative — only the two
  # cleanest forms in strong; "Castellini Group of Companies" / "Castellini
  # Co" / "Castellini Companies" stay in verifying_signals as weaker
  # confirming variants.
  employers:
  - "Castellini Group"
  - "Castellini Company"
  zip_codes: []
  # Indian Hill (45243) is the suburb consistently reported in property
  # records, but no Tier 2 source for Bob's specific ZIP. Promote in
  # calibration if filings cluster at a specific ZIP.

# Calibration round 1 (2026-05-22): Cincinnati has a Wells Fargo Advisors
# financial advisor named Bob Castellini (different person). PROBABLE audit
# also turned up "CASTELLINI, ROBERT S" (different middle initial S vs H)
# at "SENA WELLER ROHS & WILLIAMS" and several "CASTELLINI, ROBERT" filings
# at "UBS PAINE WEBBER" — all financial-advisor doppelgängers. Adding their
# employer strings as negatives to keep them out of CONFIRMED.
negative_signals:
  employers:
  - "UBS PAINE WEBBER"
  - "Sena Weller Rohs & Williams"
  - "Wells Fargo Advisors"

