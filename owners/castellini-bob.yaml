notes: |
  Bob led the group that purchased the Cincinnati Reds from Carl Lindner for
  ~$270M (70% controlling stake), MLB approved 2006-01-19, became majority
  owner 2006-01-20. He has chaired Castellini Group of Companies (family
  produce business founded 1896) since 1992. Lives in Indian Hill, OH
  (Cincinnati suburb).

  Tenure end: 2026-02-12 (MLB approved transfer of team control to son Phil).
  Whether Bob retained economic stake / limited-partner status vs. fully sold
  is not stated in public reporting. User direction: treat 2026-02-12 as the
  tenure end, continue tracking Bob's full federal giving history (pre- and
  post-tenure both in scope, per CHARTER).

  DOPPELGÄNGER WATCH (not yet a negative_signal): A separate Bob Castellini
  works as a Wells Fargo Advisors financial advisor in Cincinnati. Distinct
  individual. If FEC records surface with employer "Wells Fargo Advisors"
  and Cincinnati anchor, that is likely the doppelgänger. Add to
  negative_signals after first ingestion confirms.

  Castellini is a prominent Cincinnati surname — expect other unrelated
  Castellinis in OH FEC records (family members + unrelated regional
  Castellinis). Strict name matching (require "Robert" / "Bob") should
  filter these.

