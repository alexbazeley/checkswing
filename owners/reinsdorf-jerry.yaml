    Tier-A calibration round 1 — populated strong_signals (both employers
    and zip_codes) based on the pattern that emerged from the first
    ingestion's 255 CONFIRMED / 167 PROBABLE distribution.

    Audit findings: the 167 PROBABLE records were dominated by Bojer
