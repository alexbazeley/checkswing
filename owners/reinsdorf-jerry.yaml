notes: |
  Full legal name is Jerry Michael Reinsdorf (NOT "Jerome" as sometimes
  speculated). Owns the White Sox via Chisox Corp; also chairs the Chicago
  Bulls (NBA, separate project scope).

  Tenure_end_date: null. The June 2025 Ishbia option deal does NOT change
  controlling ownership. Justin and Mat Ishbia hold ~35% as limited partners;
  a Michael/Jonathan Reinsdorf-managed fund holds ~30%; Jerry personally
  retains ~20%. Sale option opens 2029 with deadline 2034. Until/unless the
  option is exercised, Jerry remains chairman and controlling owner.

  CRITICAL family-collision risks:
    - Son Michael Reinsdorf (Chicago Bulls President) — same surname, plausible
      "M. Reinsdorf" filings. Jerry's middle name is also Michael, compounding
      the risk. name_variants require full "Jerry" first name.
    - Sons Jonathan and David Reinsdorf — similar concern; first-name
      disambiguation is the firewall.
    - Pre-2021 records labeled "Martyl Reinsdorf" or "Mrs. Reinsdorf" are
      his late wife — not him.

  Residence: Chicago / Highland Park IL. No Tier 2 source confirms Arizona
  or Florida secondary residence despite Camelback Ranch spring training
  connection.

  Pre-1981 filings (Balcor era 1973-87) may use Balcor as employer — Balcor
  candidate for post-calibration strong_signals.employers promotion.

