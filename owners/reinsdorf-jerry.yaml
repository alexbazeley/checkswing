    Created during Phase 2 batch 2 research. Tier 2 sources: SABR
    biography, MLB.com (406, cross-confirmed), Britannica, GW Alumni.

    name_variants designed for sibling/parent disambiguation (no bare
    Reinsdorf, no first-initial-only forms). strong_signals empty
    pending calibration; Balcor candidate for promotion if first
    ingestion shows clean profile.

    tenure_end_date null because the June 2025 Ishbia option-based deal
    retains Jerry as chairman/controlling owner; sale option opens 2029.
