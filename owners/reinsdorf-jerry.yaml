      2. strong_signals.zip_codes += "60616" and "606163621" — Jerry's
         Chicago address. 247 CONFIRMED records already shared these ZIPs
         (102 + 145 respectively) at the time of the audit. The 153
         PROBABLE records at the same ZIPs were all "MONFORT, JERRY"... I
         mean "REINSDORF, JERRY"-named records with generic employer
         strings — clearly him, missing the employer-signal corroboration.

    Balcor intentionally NOT promoted (notes flagged that pre-1987
    ex-Balcor employees may still file Balcor historically).

    Pre-calibration counts: 255 CONFIRMED / 167 PROBABLE / 0 UNCERTAIN-open.
    Expected impact: ~250-300 PROBABLE records → CONFIRMED via the new
    strong signals; CONFIRMED total ~400+; PROBABLE drops to single digits.
    This is a large positive swing; if any unexpected drop in CONFIRMED
    occurs (the >5% manual-review threshold), the pre-reclassify snapshot
    is the rollback path.
  by: "claude-code-session (PR 4 Tier A, approved by alex via Option B)"
