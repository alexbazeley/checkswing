# Jerry Reinsdorf — Chicago White Sox
# Principal owner / Chairman since 1981. Also chairs Chicago Bulls (NBA, separate
# project scope). Family-ownership case — multiple Reinsdorf sons (Michael, Jonathan,
# David) and daughter Susan have public roles; the late wife Martyl Reinsdorf
# died in 2021. None tracked under this slug.
#
# Read OWNER_SCHEMA.md before editing. Read CLAUDE.md §1.7 before adding entities.

slug: reinsdorf-jerry
name: Jerry M. Reinsdorf
team: Chicago White Sox
role: Chairman / Principal owner
status: pilot
tenure_start_date: 1981-01-29   # 14-0 AL owners' vote at O'Hare Hilton (SABR)
tenure_end_date:

# Conservative name variants. Critically:
#   - "Reinsdorf" alone is NEVER a variant — matches every family member.
#   - "M. Reinsdorf" excluded — ambiguous with son Michael (Bulls President).
#   - "J. Reinsdorf" excluded — ambiguous with son Jonathan.
#   - "D. Reinsdorf" excluded — ambiguous with son David.
#   - Jerry's middle name is "Michael" — that compounds the Michael-the-son
#     collision risk. The variants require the full first name "Jerry".
name_variants:
- "Jerry Reinsdorf"
- "Jerry M Reinsdorf"
- "Jerry M. Reinsdorf"
- "Jerry Michael Reinsdorf"
- "Reinsdorf, Jerry"
- "Reinsdorf, Jerry M"
- "Reinsdorf, Jerry M."

verifying_signals:
  cities:
    # Chicago + Highland Park (North Shore). Bannockburn (sometimes cited in
    # press) was not confirmed by Tier 2; not added. AZ secondary (Camelback
    # Ranch spring training) not affirmatively a residence.
  - "chicago"
  - "highland park"
  states:
  - "IL"
  employers:
    # White Sox + Bulls — both his properties. Bulls filings will appear
    # because he's also Bulls chairman.
  - "Chicago White Sox"
  - "White Sox"
  - "Chicago Bulls"
  - "Balcor Company"
  - "Balcor"
  occupations:
  - "chairman"
  - "owner"
  - "principal"
  - "principal owner"
  - "managing partner"

strong_signals:
  # Bojer Financial Ltd is Jerry's family investment office (Chicago).
  # Promoted 2026-05-25 after Tier-A calibration: audit found 116 PROBABLE
  # records under Bojer Financial variants, all at Jerry's CONFIRMED Chicago
  # ZIPs (60616 / 606163621). Only Reinsdorfs work at Bojer; the name_variant
  # filter (requires "Jerry" first name) prevents over-shooting to son
  # Michael, Jonathan, David, or daughter Susan.
  #
  # Balcor (1973-87 real estate firm) intentionally NOT promoted to strong —
  # sold 1987; many ex-Balcor employees may still file historical "Balcor"
  # as employer. Stays in verifying_signals.employers.
  employers:
  - "Bojer Financial"            # case-insensitive substring catches LTD / LTD. / ,LTD / etc.
  # ZIPs 60616 + 606163621 are Jerry's Chicago address. Tier-A audit showed
  # 247 CONFIRMED records share these two ZIPs (102 + 145 respectively); the
  # PROBABLE records at the same ZIPs (119 + 34) are also Jerry, just with
  # generic SELF / (none) / Bojer-variant employer strings. Strong-ZIP
  # promotion lets those records CONFIRM on name + ZIP alone.
  zip_codes:
  - "60616"
  - "606163621"

# Negative signals: no doppelgängers identified at creation. Calibration may
# need to add if son Michael Reinsdorf files records that match Jerry's
# variants through normalization quirks.

related_entities: []
