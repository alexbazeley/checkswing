notes: |
  John J. Sherman (b. 1955-04-12). Led the investor group that purchased the
  Kansas City Royals from David Glass family. MLB approval 2019-11-21;
  closing 2019-11-25 (using closing date as tenure_start_date). Built fortune
  in midstream energy: Ferrellgas executive → founded LPG Services (sold to
  Dynegy 1996) → founded Inergy L.P. (1996, merged into Crestwood 2013) →
  Crestwood Equity Partners board director through 2023 sale to Energy
  Transfer.

  Residence: Kansas City metro primary (Mission Hills/Brookside/etc.
  unconfirmed at street level; press describes as "Kansas City, Missouri-
  based"). FEC filings may carry MO or KS given the metro spans the border.
  Long-tenure secondary residence in Boca Grande, FL (Gasparilla Island),
  per Boca Beacon profile (~15 years).

  HIGH DOPPELGANGER RISK. Specific cases to watch:
   - Bruce Sherman (Marlins owner, Naples FL) — DIFFERENT first name; won't
     collide via Sherman's variants.
   - John Sherman, Ellsworth KS attorney — same first/last + KS state. Need
     to reject via employer (law firm) or occupation (attorney) signals.
     Calibrate negative_signals.employers if observed.
   - Brooks Sherman (Royals co-investor) — DIFFERENT first name; possible
     family relation, NOT confirmed.
   - U.S. Rep. Brad Sherman (D-CA) — different first name; no collision.
   - "John Sherman, Jr." in VPAP (Virginia donor) — different suffix.
  Negative_signals not pre-emptively populated; calibrate after first
  ingestion.

  Strong_signals: "Inergy L.P." / "Inergy Midstream" (1996-2013; small
  private firm; uniquely identifying for that era) and "Sherman Family
  Foundation" (small private foundation, founded 2006).

  NEEDS-CONFIRMATION: Sherman previously held a ~30% minority stake in the
  Cleveland Indians/Guardians (2016-). MLB cross-ownership rules typically
  force divestiture; status post-Royals purchase is unclear. Cleveland
  Indians/Guardians NOT added to employer signals here to avoid Dolan-
  attribution overlap; revisit after first ingestion.

