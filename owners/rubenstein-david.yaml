# David M. Rubenstein — Baltimore Orioles (NEW PRINCIPAL)
# Took over from the Angelos family in 2024. Co-founder of The Carlyle Group;
# host of "Bloomberg Wealth"; chairman of Smithsonian, Kennedy Center.
#
# Acquisition vehicle: Inner Harbor Sports LLC (Delaware, formed 2024-01-11).
# Initial closing 2024-03-27 (~40% stake + sole general partner interest at
# $1.725B). Final closing 2024-08-01 (remaining 60% from Angelos family).
#
# Read OWNER_SCHEMA.md before editing. Read CLAUDE.md §1.7 before adding entities.

