notes: |
  Rubenstein is a Baltimore native (born 1949) but has lived in Bethesda, MD
  since 1985. He also owns a Nantucket, MA compound. Carlyle is headquartered
  in Washington, DC — filings may list DC as employer city even though
  Rubenstein resides in Maryland.

  Tenure_start_date 2024-03-27 reflects MLB owners' unanimous approval and
  transfer of the control stake ($1.725B for sole general partner interest +
  37% of LP interests). The Rubenstein group closed on the remaining 60%
  Angelos shares on 2024-08-01.

  Acquisition vehicle: Inner Harbor Sports LLC (Delaware, formed 2024-01-11).
  Rubenstein and Ares Management co-founder Michael Arougheti listed as
  co-presidents.

  Declaration Capital (2017) is his family office. Declaration Partners is
  the affiliated external investment firm. Both are strong-signal employers
  — small headcount, name uniquely tied to him.

  Identity disambiguation: confirmed distinct from Howard Rubenstein (NYC PR
  exec, d. 2020) and from NYC Rubenstein Properties real-estate families.

  Pre-Orioles giving (pre-2024-03-27) should be ingested — Rubenstein is a
  long-time federal donor independent of baseball. Default per project rules
  is full available history; reports can filter to post-tenure if needed.

  Doppelgänger pattern (documented during Tier-A calibration 2026-05-24): a
  different David Rubenstein in the DC/MD area files small-dollar Democratic
  donations to ActBlue from Garrett Park MD (20 records), Chevy Chase MD,
  Washington DC zip 20009, and Westborough MA, with employer/occupation
  combinations like "SELF / CONSULTANT", "SELF-EMPLOYED / ADVISOR", or
  "NOT EMPLOYED". One PROBABLE record was filed under "GEORGETOWN UNIVERSITY"
  with occupation "V.P. OF FINANCIAL PLANNING & ANALYSIS" — caught by
  negative_signals.employers below. The remaining doppelgänger records
  correctly stay UNCERTAIN via the city/state-outside-documented-residences
  rule. Do NOT add Garrett Park, Chevy Chase, or Westborough to cities;
  doing so would silently promote the doppelgänger to PROBABLE.

