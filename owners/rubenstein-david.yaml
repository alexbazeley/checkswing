strong_signals:
  # Declaration Capital / Declaration Partners: his family office and
  # affiliate; very small headcount, named after his Declaration of
  # Independence / Magna Carta interests — virtually unique to him.
  # Inner Harbor Sports: the Delaware LLC formed Jan 2024 to acquire the
  # Orioles; he is co-president with Michael Arougheti. No other federal
  # filer would use this.
  # The Carlyle Group is NOT a strong signal — ~1,800 employees, many file
  # Carlyle as employer — stays in verifying_signals.
  employers:
    - "Declaration Capital"
    - "Declaration Partners"
    - "Inner Harbor Sports"
  zip_codes: []

# Anti-pattern: at least one DIFFERENT David Rubenstein files small-dollar
# (≤ $100) Democratic donations from the DC/MD area (Garrett Park MD primary,
# Chevy Chase MD, Washington DC zip 20009, Westborough MA). That person's
# employer/occupation pattern in FEC filings: "SELF" / "CONSULTANT",
# "SELF-EMPLOYED" / "ADVISOR", "NOT EMPLOYED", or one specific Georgetown
# University record listing occupation "V.P. OF FINANCIAL PLANNING & ANALYSIS"
# — David Rubenstein the billionaire is chairman of Georgetown's BOARD, not
# a VP of Financial Planning. The Georgetown record is the only one we can
# disqualify by employer string; the generic "SELF" / "NOT EMPLOYED" records
# correctly stay UNCERTAIN via the city/state outside documented residences
# rule (Garrett Park / Chevy Chase / Westborough are NOT in cities).
negative_signals:
  employers:
    - "Georgetown University"

