    # Washington, DC — Carlyle HQ (1001 Pennsylvania Ave NW); some filings list
    #   employer city rather than home address.
    # Nantucket, MA — large compound (purchased 1998); seasonal home.
    # Baltimore, MD — birthplace and team city; filings expected post-2024.
    - "bethesda"
    - "washington"
    - "nantucket"
    - "baltimore"
  states:
    - "MD"
    - "DC"
    - "MA"
  employers:
    # Declaration Capital, Declaration Partners, Inner Harbor Sports are in
    # strong_signals below — not duplicated here (OWNER_SCHEMA.md rule 6).
    - "The Carlyle Group"
    - "Carlyle Group"
    - "Carlyle"
    - "Baltimore Orioles"
    - "Orioles"
  occupations:
    - "co-founder"
