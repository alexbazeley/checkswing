notes: |
  Walter's primary residence is Chicago (Lincoln Park). His sports-holding
  vehicle is TWG Global Holdings — owns Dodgers stake, Lakers stake (closed
  Oct 30 2025, $10B with unanimous NBA Board approval; Buss family retains
  minority; Jeanie Buss remains governor), 12.7% of BlueCo (Chelsea FC), and
  Cadillac F1 team (debuting 2026).

  Dodgers ownership group includes Magic Johnson, Stan Kasten, Peter Guber,
  Bobby Patton. Walter is the controlling owner with ~27% stake. Todd Boehly
  was historically part of the group but split off to lead BlueCo / Chelsea
  FC takeover.

  Guggenheim Partners (Chicago-based, ~$345B AUM, ~1,000+ employees) is
  Walter's primary executive role since co-founding ~1999. Employer string
  "Guggenheim Partners" or "Guggenheim" likely on most older filings.

  Strong_signals.employers populated with TWG Global / TWG Global Holdings —
  the family holding company. Tier 2 sources uniquely identify TWG with him.
  Records filing TWG as employer + name match = effectively diagnostic.

