notes: |
  Tenure start is 2011-11-17 (unanimous MLB owners' approval), not the
  2011-05-16 sale announcement.

  Crane's principal companies, in order of usefulness as FEC signals:
    1. Crane Capital Group — his investment holding company (founded 2006),
       strong_signal because named after him and Nabors lists him as sole
       principal.
    2. Houston Astros — observed FEC employer string with occupation Chairman.
    3. Crane Worldwide Logistics — operating subsidiary; many employees file
       this so it stays as a verifying signal (not strong).
    4. Crane Freight & Cartage — smaller subsidiary; not added in initial
       pass; promote during calibration if observed in real filings.

  Same-name caveat (parked for audit, not yet a negative_signal): there is a
  separate Hong Kong / Singapore real-estate firm also called Crane Capital
  (cranecapital.com). Unlikely to appear in US FEC data, but if a non-Texas
  filing carries "Crane Capital" as employer it may be that firm.

  Per derivative-FEC data (campaignmoney.com): other James Crane donors are
  in TN/GA/MS/FL/PA, all retired or not employed. None have Texas anchors.

  Pre-purchase giving (before 2011-11-17): Crane gave heavily before becoming
  Astros owner (RNC 2000, Cornyn, Hutchison, Obama 2007–2008, DNC, DCCC).
  Per CHARTER decision-points, pre-tenure giving is in scope — `tenure_start_date`
  is a report-time filter, not an ingestion gate.

