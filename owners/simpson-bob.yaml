notes: |
  Bob R. Simpson (b. ~1948; Baylor BBA Accounting 1970, MBA 1971; CPA) —
  Co-Chairman and Principal Owner of the Texas Rangers since 2010-08-12
  (Rangers Baseball Express closing out of Chapter 11 bankruptcy auction,
  jointly with Ray C. Davis). Fort Worth, TX-based.

  Career background: Founded Cross Timbers Oil Company in 1986 (renamed
  XTO Energy in 2001); Chairman from 1996; sold XTO to ExxonMobil in
  June 2010 for $41B. Founded MorningStar Partners 2012 (renamed TXO
  Partners 2023; IPO January 2023 on NYSE under ticker TXO). Stepped
  down as TXO CEO effective 2025-04-01 (announced 2025-03-20), retaining
  Chairmanship. Co-CEOs since: Brent W. Clum and nephew Gary D. Simpson.

  Strong_signals: "XTO Energy", "TXO Partners" / "TXO Energy Partners",
  "MorningStar Partners", "Cross Timbers Oil" / "Cross Timbers Oil
  Company" — these uniquely-named entities he founded or chaired.
  After 2010 sale, an FEC filing with "XTO Energy" employer is still
  strong because most former XTO employees moved to ExxonMobil.

  CRITICAL — name_variants strictly require "R." middle initial. Bare
  "Bob Simpson" / "Robert Simpson" forms are EXCLUDED to prevent
  catching unrelated Bob/Robert Simpsons (a common name). FEC records
  without the "R." middle initial would be name-only matches at best
  and should be routed to UNCERTAIN unless a strong-signal employer
  string matches.

  Doppelganger watch: "Bob Simpson" / "Robert Simpson" is common.
   - Bobby Simpson / Bob Simpson, Australian cricketer (international, low
     US-FEC risk).
   - Various "Robert Simpson" / "Bob Simpson" entries in FEC across the US.
   - Other Bob Simpsons in unrelated Fort Worth-area businesses (Fort
     Worth is a petroleum hub; the name is locally common).
  All filtered out by strict middle-initial requirement.

  Co-chairman: Ray C. Davis (Dallas-based; Avatar Investments / Energy
  Transfer background). DIFFERENT signal stack — tracked under separate
  slug `davis-ray`.

  NEEDS-CONFIRMATION: Full first name (commonly "Robert" but not Tier 2-
  documented). Middle name behind "R." not publicly disclosed. Residential
  ZIP (within Fort Worth) not in Tier 2; strong-zip 76102 (office) is a
  Tier-B calibration pragmatic choice pending residence research.

