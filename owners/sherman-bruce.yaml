notes: |
  Bruce S. Sherman — Chairman and Principal Owner of the Miami Marlins
  since closing on 2017-10-03 (MLB approval Sept 27, 2017; $1.2B from
  Jeffrey Loria). DIFFERENT PERSON from John Sherman (Kansas City Royals
  owner) — separate slugs.

  Naples, FL is the unambiguous residence. Sherman co-founded Private
  Capital Management (PCM) in 1986 in Naples; sold to Legg Mason in 2001 but
  remained CEO until 2009. Post-2009 his family office is M4 Capital LLC
  (Naples-registered; co-managing member Jay Baker). "M4 Capital" / "M4
  Capital LLC" is the strong-signal employer — uniquely named.

  Derek Jeter was minority partner / CEO 2017-2022 and departed
  2022-02-28 (sold ~4% stake). Sherman has been principal owner throughout.
  No 2024-2026 transition. Sherman has publicly committed to lifetime
  ownership; reaffirmed Feb 2026 spring training.

  Middle name "Stephen" appears in a single secondary-source aggregator;
  middle initial "S." is well-established. Use the initial form.

