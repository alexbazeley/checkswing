notes: |
  Patrick O. Zalupski — Principal Owner / MLB Control Person of the Tampa
  Bay Rays since 2025-09-30 (closing; MLB approval 2025-09-22 unanimous).
  ~$1.7B deal. Co-Chair: Bill Cosgrove (CEO Union Home Mortgage). Day-to-day
  CEO: Ken Babby (Jacksonville Jumbo Shrimp AAA owner). Stu Sternberg
  retained ~10% minority stake (still in ownership group, no control role).

  Strong_signals: Dream Finders Homes / DFH / DF Capital — Zalupski is
  founder/CEO/Chairman of DFH (NYSE: DFH, IPO Jan 2021). The "Dream Finders"
  string is essentially uniquely associated with him in FEC universe.

  Residence transition: Ponte Vedra Beach, FL (purchased 2016, sold
  Dec 2025) → Jacksonville, FL (Avondale neighborhood, 3730 Richmond St.,
  purchased Jan 2024 for $7.77M). Both cities listed in verifying_signals
  to cover the full FEC history window.

  NEEDS-CONFIRMATION: Full middle name spelling. SEC Form 4 filings use
  "Patrick O. Zalupski" (middle initial only); Wikipedia and aggregators
  variously render as "Odonoghue"/"O'Donoghue"/"Odonaghue" — treat middle
  initial as confirmed; full middle name as needs-confirmation.

  Doppelganger risk: LOW. Zalupski is a rare Polish/Slavic surname; the
  Patrick O. Zalupski signature pattern is essentially singular in US
  business records.

  Stadium situation: Tropicana Field roof destroyed by Hurricane Milton
  (Oct 9, 2024); Rays played 2025 at Steinbrenner Field; returned to
  Tropicana April 6, 2026. Tampa City Council OK'd a Rays stadium plan
  May 21, 2026 (Westshore / Dale Mabry area). Lease at Trop runs through
  2028.

