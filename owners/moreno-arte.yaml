notes: |
  Bought Angels from Walt Disney Company in 2003 for ~$184M. Pulled sale
  exploration on 2023-01-23 ("hearts remain with the Angels"). Continues
  investing in Arizona real estate as of 2026 ($60M office buy Nov 2024,
  $125M Biltmore apartments March 2026). Still principal owner.

  Residence: Phoenix, AZ — specifically the Biltmore Estates neighborhood
  (60 Biltmore Estates Drive). NOT Paradise Valley — multiple Tier 2 sources
  consistently say Phoenix. The Biltmore is a Phoenix-proper neighborhood.

  Built wealth from Outdoor Systems (billboard advertising), sold to
  Infinity Broadcasting / Viacom in 1999 for ~$8.7B. Pre-1999 filings may
  use Outdoor Systems as employer; post-2003 likely team-name variants.

  Foundations (Moreno Family Foundation, Angels Baseball Foundation) are
  explicitly out of scope per CLAUDE.md §6 (IRS 990s = separate project).

  Doppelgänger landscape (audit 2026-05-25): UNCERTAIN-open records are
  distinct Morenos in different metros — Bonita CA (R.J. Donovan
  Correctional Facility Lieutenant), Chula Vista CA (retired WinRed donor),
  Mesa AZ (CPA ActBlue donor). One Anaheim CA filing IS Arte (employer
  "ANGELS BASEBALL L.P./OWNER" + occupation OWNER) but is UNCERTAIN
  because address-contradicts rule fires before strong-signal CONFIRMED
  per VERIFICATION.md. Not adding "anaheim" to cities — would also
  capture team-employee Morenos.

