notes: |
  DeWitt is the third generation of his family in baseball ownership — his
  father William O. DeWitt Sr. was prominent in MLB (deceased 1982, predates
  modern FEC data). DeWitt Jr. was also part of the 1981-82 Cincinnati Reds
  ownership group (with Bob Castellini, the Williams brothers — same group
  that later acquired the Cardinals together) before splitting to lead
  St. Louis solo.

  Primary residence Indian Hill (Cincinnati suburb). Reynolds, DeWitt & Co.
  (founded 1979 with Mercer Reynolds) is his Cincinnati-based investment
  firm. DeWitt Capital Group (registered 2012) is a more recent personal
  vehicle.

  CRITICAL family-collision risk: Son William O. DeWitt III is Cardinals team
  president and likely a federal donor. He'd file under similar variants
  without the "Jr." suffix. The classifier's suffix-mismatch rule should
  catch "DeWitt III" filings → UNCERTAIN. Audit must validate.

  Spirit of St. Louis Holdings (sometimes cited in press as DeWitt holding
  entity) could NOT be verified in Tier 2 sources — most search hits are the
  Lindbergh aircraft. NOT added as a signal.

