# Master registry of MLB owners tracked by this project.
# This file is the single source of truth for who is in scope.
#
# Statuses:
#   pilot   — currently being built out and validated (Phase 1 / 1.5)
#   queued  — in scope for Phase 2; YAML not yet populated
#   active  — fully populated, validated, in steady-state ingestion
#   paused  — temporarily not ingesting (ownership transition, etc.)
#
# Adding a new owner:
#   1. Add an entry here with status: queued
#   2. Create owners/<slug>.yaml from _template.yaml
#   3. Populate verifying_signals from at least two independent Tier 2 sources (SOURCES.md)
#   4. Promote to status: pilot or active once validated
#
# Last updated: 2026-05-22

owners:
