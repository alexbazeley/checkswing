    name: Steven A. Cohen
    team: New York Mets
    role: Principal owner
    tenure_start_date: 2020-11-06
    status: pilot
    notes: >
      Phase 1 pilot. Highest-profile, well-documented. Multiple unique-employer
      strong signals available (Point72, Cohen Private Ventures). Spouse Alexandra
