notes: |
  Primary residence Brentwood (LA), with secondary Malibu beach home and
  Milwaukee penthouse (University Club Tower). Expect filings from both CA
  and WI.

  Employer history: Drexel Burnham Lambert (1985-1990); Crescent Capital
  Corporation co-founded 1991 (Dallas-then-LA); TCW acquired Crescent in
  1995; Attanasio remained TCW senior partner / "group managing director"
  through 2011, when Crescent spun back out as Crescent Capital Group.
  Filings 1995-2011 may report TCW; 2011-present should report Crescent
  Capital Group / Crescent Capital.

  MLA Sports LLC is his personal holding entity at the Crescent LA office
  (11100 Santa Monica Blvd). Less commonly filed but diagnostic when it
  appears.

  No principal-ownership change for Brewers as of 2026. Succession to sons
  Dan/Mike discussed in press, no timetable. The October 2024 ownership
  change reported in some search results refers to Norwich City F.C. (his
  English soccer club, 85% stake), NOT the Brewers — out of scope.

