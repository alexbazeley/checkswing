# John C. Malone — Atlanta Braves (Co-principal shareholder)
# Largest individual economic and voting shareholder of Atlanta Braves
# Holdings, Inc. (NASDAQ: BATRA / BATRK). Per user direction (Davis-Simpson-
# style co-principal model), tracked as a separate slug from
# Terry McGuirk (the MLB Control Person + day-to-day Chairman/President/CEO).
#
# IMPORTANT EDITORIAL CAVEAT: Malone's federal political donor footprint is
# vast (~$2M in 2024 cycle alone, primarily to Republican federal candidates
# and conservative super PACs) and is overwhelmingly driven by his Liberty
# Media / Liberty Broadband / Liberty Global identity, NOT his Braves
# stake. Reports drawing inferences like "MLB owners donated $X to Y" using
# Malone's totals should clearly tag those donations as being part of
# Malone's broader Liberty-Media-mogul identity rather than implying
# Braves-driven political activity.
#
# Read OWNER_SCHEMA.md before editing. Read CLAUDE.md §1.7 before adding entities.

