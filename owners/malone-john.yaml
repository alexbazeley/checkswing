notes: |
  John Carl Malone, Ph.D. (b. 1941-03-07). Cable / media mogul; longtime
  chairman of Liberty Media (transitions to Chairman Emeritus effective
  2026-01-01, with Robert R. "Dob" Bennett assuming the chairmanship).
  Primary residence: Elizabeth, CO (Elbert County) — long-tenure address;
  largest US individual landowner (~2.2M acres across Maine, Colorado, New
  Mexico, Wyoming).

  Braves connection: Largest individual economic and voting shareholder of
  Atlanta Braves Holdings (NASDAQ: BATRA / BATRK) — holds 887,079 Series B
  Common Stock representing ~44% of company voting power. On 2024-08-22,
  granted a "sole and exclusive" proxy to Terry McGuirk to vote those
  shares on director elections and other routine matters (preserves vote
  on non-routine matters). Right of first refusal on Malone's share
  transfers (20-business-day match window); appreciation right on share
  sales above $50/share. Not currently on the ABH board.

  tenure_start_date 2007-05-16: date Liberty Media completed acquisition
  of the Braves from Time Warner via the Liberty/Time Warner stock swap.
  Malone has been an ownership-group principal since that point. Pre-2007
  donations are pre-tenure (per CHARTER, in scope but tagged via tenure
  date); his pre-2007 corporate identity was TCI (Tele-Communications
  Inc., 1973-1996) → AT&T Broadband (after the 1999 sale).

  HIGH DOPPELGANGER RISK. "John Malone" is a very common name. The
  uniquely identifying combination for our Malone is Elizabeth, CO city +
  Liberty Media (or related Liberty) employer string. Other John Malones
  in DC, NYC, Boston, etc. with non-Liberty employer signatures or non-CO
  state should NOT match.

  Editorial caveat: His ~$2M of 2024-cycle Republican federal giving
  (including $1M to Congressional Leadership Fund + $41,300 to NRCC + many
  $3,300 max-out hard-money checks to GOP House candidates) is
  overwhelmingly driven by his Liberty Media / Republican-mega-donor
  identity. Reports aggregating "MLB owner political giving" should tag
  Malone's totals as overwhelmingly non-baseball-driven, even though we
  attribute them to him here (per user's Davis-Simpson-style co-principal
  framing).

  Liberty Media Corporation PAC (FEC C00508101): TERMINATED. Not a current
  related_entity. Historical-context only.

  Charter Communications PAC (FEC C00426775): ACTIVE corporate PAC, but
  Malone is not employed by Charter (director emeritus only since July
  2018 retirement); Charter PAC donations are NOT to be attributed to
  Malone the individual.

