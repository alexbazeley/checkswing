notes: |
  Ray C. Davis (b. 1941-10-15) — Managing Partner, Majority Owner, Chairman
  of the Board, MLB-designated Control Person of the Texas Rangers. Tenure
  start 2010-08-12 (Rangers Baseball Express closing out of Chapter 11
  bankruptcy auction; press universally "August 2010" — exact day needs
  confirmation). MLB owners formally approved him as control person on
  2013-11-14 in Orlando (after Nolan Ryan's resignation announced
  2013-10-17).

  Davis "avoids publicity" per D Magazine. Cofounded Energy Transfer
  Partners (1996) with Kelcy Warren; retired from operational role at ETP
  in 2007. Now Chairman/CEO of Avatar Investments LP, a Dallas-based
  family investment firm focused on energy and real estate (Sherry Lane
  offices).

  Strong_signal: "Avatar Investments" / "Avatar Investments LP" — uniquely-
  named private family vehicle. Should produce few false-positives on FEC
  employer field. Energy Transfer-related strings stay in verifying because
  the ETP/ETE companies have many employees who file their own donations.

  Co-chairman: Bob R. Simpson (Fort Worth-based; XTO Energy / TXO Partners
  background). DIFFERENT signal stack — tracked under separate slug
  `simpson-bob`. The pair purchased the team out of bankruptcy together
  in August 2010. Bob R. Simpson is co-chairman; Ray C. Davis is the
  formal MLB control person.

  Other group members (NOT tracked here): Neil Leibman (Board / Rangers
  Ownership Committee Chairman; minority partner active in operations);
  Chuck Greenberg (sold his stake 2011; no longer an owner); Nolan Ryan
  (departed 2013).

  DOPPELGANGER WATCH: "Ray Davis" is a common name. Audit during 2026-05-25
  Tier-B calibration documented three distinct living "Ray Davis"
  doppelgängers in Texas, all correctly routed away from CONFIRMED:
    - SW Dallas (ZIP 75232, Oak Cliff): "Davis, Ray" w/ employer NONE / NOT
      EMPLOYED filing $1-$500 ActBlue and Beto for Texas donations. ~8
      records as PROBABLE (name + city signal only). Stays PROBABLE — not
      promoted via strong-zip because 75232 is a distinct doppelgänger ZIP.
    - Doss / Gillespie County (ZIP 786180075): "Davis, Ray" RETIRED filing
      small-dollar WinRed donations ($1-$19) in 2024. Caught as UNCERTAIN
      via city/state-outside rule.
    - Spring TX (ZIP 773794696, Houston metro): "Davis, Ray C. MR." with
      employer "BEHAVIORAL RECOGNITION INC." occupation C.E.O. — middle
      initial collision but distinct employer. 1 record as UNCERTAIN via
      city/state-outside. Not negative-signaled because the city firewall
      already catches it and there's only 1 record.
    - Historical: a different Ray Davis served as Pennzoil president; if
      encountered in future filings, add to negative_signals.

  The "C." middle initial + Dallas TX + Avatar Investments + Energy Transfer
  board form a robust signal stack. Strong-signal ZIP 75225 (Highland Park /
  Preston Center, where Avatar's Sherry Lane offices are) is the safety net
  for filings where Davis writes "RETIRED" instead of an Energy Transfer or
  Avatar employer string.

  NEEDS-CONFIRMATION: Davis's residential vs office split within 75225.
  Middle name behind "C." not publicly disclosed.

