notes: |
  José E. Feliciano — Co-founder and Managing Partner of Clearlake Capital
  Group (founded 2006, Santa Monica CA, >$90B AUM). Bayamón, PR-born;
  Princeton '94; Stanford GSB MBA. Sale agreement to acquire ~40% of the
  San Diego Padres at $3.9B announced 2026-05-02 (with wife Kwanza Jones).
  MLB approval expected at June 2026 owners meetings; deal targeted to
  close pre-2026 All-Star Break.

  PRE-APPROVAL PILOT STATUS: tenure_start_date 2026-05-02 anchors to the
  public sale-agreement / designated-control-person announcement, NOT MLB
  approval (which hasn't happened yet). When MLB approves and the deal
  closes, update tenure_start_date to the actual close date and add a
  change_log entry. seidler-john.yaml's tenure_end_date should also be
  set at that point.

  HIGH DOPPELGANGER RISK — pre-emptive negative_signal block:
   - José Monserrate Feliciano García (the famous blind Puerto Rican singer,
     b. Sept 10, 1945, in Lares, PR; long-tenure Weston, CT resident; known
     for "Feliz Navidad" and 1968 World Series anthem). Substantial own
     FEC footprint. Different middle name; different state of residence
     (CT, not CA). Different employer context (musician/entertainer).
   - Other generic "Jose Feliciano" individuals in Latino communities
     nationwide.
  Mitigation: require middle initial "E." OR a documented-employer signal
  (Clearlake, or his pre-Clearlake firm Tennenbaum Capital / Special Value)
  for CONFIRMED attribution. LA/Santa Monica/Pacific Palisades/Marina del Rey
  city + investor occupation is the strong combination. CT-residence
  records or musician-occupation records auto-route to UNCERTAIN (and
  the negative_signals.employers block catches "Self-Employed Musician"
  / "Musician" / "Singer" / "Entertainer" outright).
  NOTE (2026-06-04): a contributor filing "Tennenbaum Capital" with no/other
  middle initial (e.g. "Jose F.") in the 2001–2006 window is treated as him —
  Tennenbaum was a small LA PE firm and a second Jose Feliciano principal there
  is implausible; the employer + LA-area city is the discriminator.

  Other business / sports holdings (context only): Co-financed Chelsea FC
  acquisition (2022) via Clearlake — principal of Chelsea ownership group.
  Bid unsuccessfully for Denver Broncos (2022); negotiated LA Chargers
  minority stake (2023, did not close).

  Spouse Kwanza Jones — independent professional / philanthropic identity;
  Co-CEO of the joint Kwanza Jones & José E. Feliciano Initiative.
  SEPARATE-slug candidate (`jones-kwanza`); per GOVERNANCE.md §1.7, not added
  to Feliciano's tracked-set automatically.

  NEEDS-CONFIRMATION: Full middle name (only "E." documented). Date of
  birth (year not in Tier 2). Named children (none documented).

