notes: |
  Full legal name John Staubus Middleton (b. 1955-03-02). Primary residence
  Bryn Mawr, PA. Wife Leigh Middleton (m. June 1978).

  Bradford Holdings is his parent investment holding company. Subsidiaries
  include John Middleton Inc. (the cigar firm), Double Play Inc. (the
  legal vehicle for his Phillies ownership stake), and McIntosh Inns.

  Sold John Middleton Co. (Black & Mild cigars) to Altria/Philip Morris USA
  in 2007 for $2.9B — that's the wealth source.

  Tenure: held 15% minority stake from 1994 (his father's original Phillies
  investment), expanded to 48% in 2014, MLB-designated control person at the
  owners' meeting of 2016-11-17. Nov 2024 ownership expansion added Mitchell
  L. Morgan, Guntram J. Weissenberger Jr., and one anonymous limited partner.

  "John Middleton" is a common name — Tier 2 research flagged a British
  football executive and unrelated John Middletons. The Bryn Mawr + PA +
  Phillies/Bradford signal cluster must all hit for CONFIRMED.

  John P. Middleton (son; confirmed by alex 2026-05-25) is a film producer
  at Vertigo Entertainment. He lives at the same Bryn Mawr address as his
  father and is a separate donor whose records file under "MIDDLETON,
  JOHN P." with employer VERTIGO ENTERTAINMENT. Audit 2026-05-25 found 2
  CONFIRMED + 11 PROBABLE Vertigo records being misattributed to John S.
  These are now demoted to UNCERTAIN via the negative_signals block below.
  A future classifier improvement (middle-initial preservation) will
  allow tracking John P. as a proper related_entity — see change_log.

  Dock Street Capital (2 CONFIRMED + 11 PROBABLE records): user research
  could not confirm a Middleton connection. Records may belong to John S.,
  John P., or a third doppelgänger; held as-is (PROBABLE for the bare-name
  cases, CONFIRMED for the 2 records that happen to hit
  occupation:ceo + city_state). Re-evaluate if external evidence surfaces.

  Branford Holdings: assumed to be a FEC clerk typo of "Bradford Holdings"
  per user research 2026-05-25 (no separate Branford Holdings entity
  documented). Added to verifying_signals.employers so the 3 PROBABLE
  records under that string promote to CONFIRMED.

change_log:
- date: 2026-05-31
  change: |
    Resolved the "Dock Street Capital connection" flagged out-of-scope in the
    2026-05-30 round-2 triage. Research (Wikipedia, Bloomberg Billionaires,
    company records) confirms John S. Middleton is chairman & CEO of Dock
    Street Capital Management — his structured-credit family office at 510
    Feheley Dr, King of Prussia, PA 19406. The FEC residue of "MIDDLETON,
    JOHN S." records with employer DOCK STREET CAPITAL / "REQUESTED" /
    "INFORMATION REQUESTED" at King of Prussia 19406 are therefore his own
    donations (middle initial S, his firm, his office ZIP), not a doppelgänger.

    Two deliberate signal additions (§2.5a):
    - strong_signals.employers += "Dock Street Capital" — diagnostic of him;
      CONFIRMS the Dock Street records (~$55k).
    - verifying_signals.cities += "king of prussia" — his documented office
      location; gives the employer-"Requested" records a city+state signal
      (→ PROBABLE; ~$36k). These sit at his Dock Street ZIP on the same JFC
      filing date as the confirmed $50k Dock Street donation.

    Safe: the Vertigo negative_signal still fires BEFORE signal scoring, so the
    "JOHN S. / VERTIGO / King of Prussia" records (the son's company, mis-keyed
    initial or otherwise) stay UNCERTAIN; no son record is swept in. Bradford
    "SR."-suffixed records stay handled by their existing manual_attributions.
  by: "automated pipeline (Dock Street residue resolution, maintainer-approved)"
- date: 2026-05-22
  change: |
    Created during Phase 2 batch 2 research. Tier 2 sources: MLB.com,
    Phillies control-person designation (Nov 2016), WSJ 2007 cigar sale,
    MLB.com 2024 ownership expansion.

    tenure_start_date 2016-11-17 (MLB-designated control person date).
    Pre-2016 partial-ownership records will be ingested per project default;
    reports can filter to post-tenure if needed.

    strong_signals.employers initialized with Bradford Holdings and
    Double Play Inc — both his unique holding-company vehicles.
    John Middleton Co. NOT in strong_signals (pre-2007 had thousands of
    rank-and-file employees who could share the common name).
  by: "automated research (maintainer-directed)"
  references:
  - "/tmp/middleton-john-research.md (session-local)"
- date: 2026-05-25
  change: |
    Tier-A calibration round 1. Three changes (one reverted).

    ATTEMPTED + REVERTED: added a related_entity (kind: child)
    middleton-john-p for John P. Middleton (Vertigo Entertainment film
    producer, John S.'s son). Reclassify with --include-related produced
    a catastrophic misattribution: ALL 53 CONFIRMED records were routed
    to middleton-john-p, including obvious John S. records under
    Bradford Holdings, Philadelphia Phillies, and McIntosh Inns. Root
    cause: scripts/resolve_entities.normalize_name() drops single-char
    middle-initial tokens, so "John P. Middleton" canonicalizes to
    "john middleton" — making John P.'s variants indistinguishable from
    John S.'s by name alone. The classifier checks related_entity FIRST,
    so every name-matched record was attributed to the child entity.

    The related_entity addition is the architecturally-correct approach
    but blocked on a classifier improvement to preserve middle initials
    during matching (separate PR). Reverted to the negative_signals
    approach below as the interim fix.

    APPLIED:
    1. Added negative_signals.employers ["Vertigo Entertainment",
       "Vertigo"]. John P.'s Vertigo records correctly land in
       UNCERTAIN; John S.'s records are not affected (he never files
       under Vertigo).
    2. Added "Branford Holdings" to verifying_signals.employers —
       assumed FEC clerk typo of his actual "Bradford Holdings" per
       user research (no separate Branford Holdings entity documented).
       3 PROBABLE records under that string promote to CONFIRMED.
    3. Added "Mc Intosh Inns" (with space) to verifying_signals.employers
       — typo variant of McIntosh Inns. 1 PROBABLE record promotes.

    Pre-calibration: 33 CONFIRMED / 38 PROBABLE / 19 UNCERTAIN-open.
    Predicted post-calibration: ~32 CONFIRMED (–2 Vertigo +1 Mc Intosh
    +3 Branford = +2 net relative to pre-cal; 33 → 35) / ~24 PROBABLE
    (–11 Vertigo, –1 Mc Intosh, –3 Branford) / ~32 UNCERTAIN (+13
    Vertigo records demoted).

    Dock Street Capital records left as-is — user research could not
    confirm a Middleton connection. John P. tracking as related_entity
    flagged in notes as a future change pending classifier improvement.
  by: "automated pipeline (PR 4 Tier A, maintainer-approved)"
  references:
  - "data/master.db pre-calibration: 33 CONFIRMED / 38 PROBABLE / 19 UNCERTAIN-open"
  - "data/snapshots/2026-05-25T04-02-44Z__pre-reclassify-middleton-john.db (snapshot before the failed --include-related attempt)"
- date: 2026-05-31
  change: |
    Round-2 review-queue triage, using the new txn-keyed EXCLUDE override
    (manual_attributions status=EXCLUDED) — the father/son split that the
    reverted related_entity approach and the interim Vertigo negative_signal
    could not fully resolve.

    Disambiguated by MIDDLE INITIAL (reliable; the records carry it, the
    classifier just strips it): S = John Staubus (the owner); P = John Powers
    (the son). Research confirmed John Powers Middleton is the son AND a
    documented independent major federal donor (film producer at Vertigo;
    Wikipedia + Media Matters on his political giving), so every "John P."
    record is his — not the owner's — even those loosely listing PHILADELPHIA
    PHILLIES as employer.

    APPLIED (txn-keyed manual_attributions, survive reclassify; gated):
    - ATTRIBUTED 6 queued "MIDDLETON, JOHN S. MR. SR." / Bradford Holdings
      records to John S. (owner; strong signal, queued only on the SR suffix).
    - EXCLUDED 14 "MIDDLETON, JOHN P." records (1 was CONFIRMED, 7 PROBABLE,
      6 queued) — the son. Dropped from john-s entirely.

    Result: open review queue 12 -> 0; CONFIRMED 33 -> 38; PROBABLE 23 -> 16.
    middleton-john is idempotent under reclassify (guard would_drop=0). The
    Vertigo negative_signal is retained as defense-in-depth. John P. remains a
    future middleton-john-p slug pending a classifier middle-initial fix.

    OUT OF SCOPE / flagged for later: bare-"JOHN" (no middle initial) records;
    ~10 "JOHN S." currently-UNCERTAIN records (~$105k; odd employers Dock Street
    Capital / Vertigo / "Requested" — possible missed owner donations or mis-
    keyed); the "John J" / Becica Associates donor (a different person, correctly
    unattributed); and the unresolved Dock Street Capital connection.
  by: "automated pipeline (round-2 triage, maintainer-approved)"
  references:
  - "data/snapshots/2026-05-31T01-02-28Z__pre-middleton-triage.db"

