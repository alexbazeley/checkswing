# John S. Middleton — Philadelphia Phillies
# Managing partner / MLB-designated control person since 2016-11-17. Held 15%
# minority stake since 1994, 48% since 2014. Wealth from John Middleton Co.
# (Black & Mild cigars, sold to Altria 2007 for $2.9B).
#
# Read OWNER_SCHEMA.md before editing. Read GOVERNANCE.md §1.7 before adding entities.

slug: middleton-john
name: John S. Middleton
team: Philadelphia Phillies
role: Managing partner / Principal owner
status: pilot
tenure_start_date: 2016-11-17    # MLB owners' meeting designation as control person
tenure_end_date:

# "John Middleton" is a common name. Strict variants + verifying_signals
# narrow the cluster. Middle initial "S." for Staubus included.
name_variants:
- "John Middleton"
- "John S. Middleton"
- "John S Middleton"
- "John Staubus Middleton"
- "Middleton, John"
- "Middleton, John S"
- "Middleton, John S."

verifying_signals:
  cities:
  - "bryn mawr"
  - "philadelphia"
  states:
  - "PA"
  employers:
  - "Philadelphia Phillies"
  - "Phillies"
  - "John Middleton Inc"
  - "John Middleton, Inc"
  - "John Middleton Co"
  - "John Middleton Company"
  - "McIntosh Inns"
  - "Mc Intosh Inns"              # FEC-typo variant of McIntosh Inns (with space)
  - "Branford Holdings"           # FEC-typo variant of Bradford Holdings — added 2026-05-25
  occupations:
  - "managing partner"
  - "partner"
  - "owner"
  - "principal"
  - "chairman"
  - "ceo"

strong_signals:
  # Bradford Holdings is Middleton's parent holding company — Tier 2 confirms
  # uniquely his vehicle, small headcount. Double Play Inc. holds the
  # Phillies stake specifically and would virtually only be filed by Middleton
  # personally (it's the legal vehicle of his ownership stake).
  employers:
  - "Bradford Holdings"
  - "Double Play Inc"
  - "Double Play, Inc"
  zip_codes: []

# Anti-pattern: John P. Middleton (John S.'s son, confirmed by alex during
# 2026-05-25 calibration) is a film producer at Vertigo Entertainment. He
# lives at the same Bryn Mawr address as his father and files donations
# under "MIDDLETON, JOHN P." with VERTIGO ENTERTAINMENT as employer.
# Ideally John P. would be a related_entity (kind: child) so his records
# get correctly attributed to him, but the current classifier
# canonicalizes "John P. Middleton" to "john middleton" — making John P.
# indistinguishable from John S. by name alone. A related_entity addition
# was attempted and reverted on 2026-05-25; see change_log. Until the
# classifier preserves middle initials, the cleanest available fix is to
# negative-signal Vertigo Entertainment so John P.'s records correctly
# land in UNCERTAIN rather than misattributing to John S.
negative_signals:
  employers:
  - "Vertigo Entertainment"
  - "Vertigo"

related_entities: []
# Documented future candidates (do NOT add without approval):
#   - John P. Middleton (son, film producer at Vertigo) — blocked on a
#     classifier improvement to preserve middle initials during matching.
#     See the negative_signals block above for the interim handling.
#   - Wife Leigh Middleton — no independent federal-donor profile yet
#     researched. NOT added per GOVERNANCE.md §1.7.

