strong_signals:
  # Bradford Holdings is Middleton's parent holding company — Tier 2 confirms
  # uniquely his vehicle, small headcount. Double Play Inc. holds the
  # Phillies stake specifically and would virtually only be filed by Middleton
  # personally (it's the legal vehicle of his ownership stake).
  employers:
  - "Bradford Holdings"
  - "Double Play Inc"
  - "Double Play, Inc"
  - "Dock Street Capital"         # Middleton is chairman & CEO of Dock Street Capital Management (his structured-credit family office, King of Prussia) — diagnostic of him. Added 2026-05-31.
  zip_codes: []

# Anti-pattern: John P. Middleton (John S.'s son, confirmed by alex during
# 2026-05-25 calibration) is a film producer at Vertigo Entertainment. He
# lives at the same Bryn Mawr address as his father and files donations
# under "MIDDLETON, JOHN P." with VERTIGO ENTERTAINMENT as employer.
# Ideally John P. would be a related_entity (kind: child) so his records
# get correctly attributed to him, but the current classifier
# canonicalizes "John P. Middleton" to "john middleton" — making John P.
# indistinguishable from John S. by name alone. A related_entity addition
# was attempted and reverted on 2026-05-25; see change_log. Until the
# classifier preserves middle initials, the cleanest available fix is to
# negative-signal Vertigo Entertainment so John P.'s records correctly
# land in UNCERTAIN rather than misattributing to John S.
negative_signals:
  employers:
  - "Vertigo Entertainment"
  - "Vertigo"

related_entities: []
# Documented future candidates (do NOT add without approval):
