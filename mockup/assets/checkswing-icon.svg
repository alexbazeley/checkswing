<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CheckSwing">
  <title>CheckSwing</title>
  <defs>
    <!-- Bold "C" that doubles as a baseball: an outer disc minus an inner disc,
         opening to the right. -->
    <mask id="cs-c">
      <rect width="64" height="64" fill="#000"/>
      <circle cx="32" cy="32" r="24" fill="#fff"/>
      <circle cx="32" cy="32" r="13.6" fill="#000"/>
      <path d="M32 32 L66 17 L66 47 Z" fill="#000"/>
    </mask>
  </defs>
  <rect width="64" height="64" fill="#8B1B2C" mask="url(#cs-c)"/>
  <!-- Baseball seam stitching (cream laces) hugging the inner edge of each
       terminal — a seam line crossed by short stitch ticks. -->
  <g fill="none" stroke="#FAF7F0" stroke-width="1.5" stroke-linecap="round">
    <path d="M38.4 15.4 A 18 18 0 0 1 48.0 23.6"/>
    <path d="M39.6 13.9 l1.7 3.8"/>
    <path d="M43.0 15.0 l1.4 3.9"/>
    <path d="M46.0 17.2 l1.0 4.0"/>
    <path d="M38.4 48.6 A 18 18 0 0 0 48.0 40.4"/>
    <path d="M39.6 50.1 l1.7 -3.8"/>
    <path d="M43.0 49.0 l1.4 -3.9"/>
    <path d="M46.0 46.8 l1.0 -4.0"/>
  </g>
</svg>
