<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CheckSwing">
  <title>CheckSwing</title>
  <!-- Brand crimson tile with slight radius -->
  <rect width="64" height="64" rx="8" ry="8" fill="#8B1B2C"/>
  <!-- Cream serif "C" centered. Charter / Source-Serif-like weight via stroke fill. -->
  <text x="32" y="46"
        font-family="'Source Serif 4','Charter','Georgia','Times New Roman',serif"
        font-size="48"
        font-weight="700"
        text-anchor="middle"
        fill="#FAFAF6">C</text>
  <!-- Burnt-sienna baseball dot at bottom-right (strike-zone accent). -->
  <circle cx="50" cy="50" r="4" fill="#B8552B"/>
</svg>
