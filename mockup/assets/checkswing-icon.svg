<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CheckSwing">
  <title>CheckSwing</title>
  <defs>
    <!-- Subtle vertical depth on the crimson tile (not a glow — a flat-ish tonal shift). -->
    <linearGradient id="cs-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9A2236"/>
      <stop offset="1" stop-color="#761526"/>
    </linearGradient>
    <!-- High-contrast serif "C": an outer disc minus a right-offset inner disc
         (thick left spine, thin toward the open right), with a wedge cutting the
         opening. Echoes the Fraunces display face used across the site. -->
    <mask id="cs-c">
      <rect width="64" height="64" fill="#000"/>
      <circle cx="30" cy="32" r="18" fill="#fff"/>
      <circle cx="33.5" cy="32" r="10.6" fill="#000"/>
      <path d="M30 32 L66 12 L66 52 Z" fill="#000"/>
    </mask>
  </defs>
  <rect width="64" height="64" rx="15" ry="15" fill="url(#cs-tile)"/>
  <rect width="64" height="64" fill="#FAF7F0" mask="url(#cs-c)"/>
  <!-- Warm accent "ball" at the mouth of the C — the strike point; also the
       "·" that separates every eyebrow on the site. -->
  <circle cx="49" cy="32" r="4" fill="#C56A3A"/>
</svg>
