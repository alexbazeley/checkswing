<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="CheckSwing — federal and state political contributions by MLB owners">
  <title>CheckSwing — federal and state political contributions by MLB owners</title>
  <!-- Cream background -->
  <rect width="1200" height="630" fill="#FAFAF6"/>

  <!-- Top rule in brand crimson, thin -->
  <rect x="0" y="0" width="1200" height="8" fill="#8B1B2C"/>

  <!-- Mini mark (baseball "C") top-left — matches mockup/assets/checkswing-icon.svg -->
  <defs>
    <mask id="og-c">
      <rect width="64" height="64" fill="#000"/>
      <circle cx="32" cy="32" r="24" fill="#fff"/>
      <circle cx="32" cy="32" r="13.6" fill="#000"/>
      <path d="M32 32 L66 17 L66 47 Z" fill="#000"/>
    </mask>
  </defs>
  <g transform="translate(96 96) scale(1.25)">
    <rect width="64" height="64" rx="15" ry="15" fill="#FBFAF5"/>
    <rect width="64" height="64" fill="#8B1B2C" mask="url(#og-c)"/>
    <g fill="none" stroke="#FAF7F0" stroke-width="1.5" stroke-linecap="round">
      <path d="M38.4 15.4 A 18 18 0 0 1 48.0 23.6"/>
      <path d="M39.6 13.9 l1.7 3.8"/><path d="M43.0 15.0 l1.4 3.9"/><path d="M46.0 17.2 l1.0 4.0"/>
      <path d="M38.4 48.6 A 18 18 0 0 0 48.0 40.4"/>
      <path d="M39.6 50.1 l1.7 -3.8"/><path d="M43.0 49.0 l1.4 -3.9"/><path d="M46.0 46.8 l1.0 -4.0"/>
    </g>
  </g>

  <!-- Wordmark + deck, left-aligned -->
  <text x="96" y="320"
        font-family="'Source Serif 4','Charter','Georgia','Times New Roman',serif"
        font-size="128"
        font-weight="700"
        fill="#1A1916">CheckSwing</text>

  <text x="96" y="400"
        font-family="'Source Serif 4','Charter','Georgia','Times New Roman',serif"
        font-size="44"
        font-weight="500"
        fill="#4A4842">Where MLB's owners spend in politics.</text>

  <!-- Stat strip -->
  <g font-family="'Inter','Helvetica Neue','Arial',sans-serif" fill="#7A7669" font-size="22">
    <text x="96" y="500" font-weight="600" fill="#1A1916">36 owners</text>
    <text x="280" y="500" font-weight="600" fill="#1A1916">Federal + state</text>
    <text x="540" y="500" font-weight="600" fill="#1A1916">2000–present</text>
    <text x="780" y="500" font-weight="600" fill="#1A1916">Sourced from official filings</text>
  </g>

  <!-- Bottom rule + footer URL -->
  <rect x="96" y="540" width="1008" height="1" fill="#C9C4B4"/>
  <text x="96" y="580"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20"
        fill="#7A7669">checkswing.pages.dev</text>
  <text x="1104" y="580"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20"
        fill="#7A7669"
        text-anchor="end">Federal + state political money</text>
</svg>
