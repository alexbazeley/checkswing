name: Weekly FEC refresh

# Runs the self-maintaining refresh layer (scripts/refresh.py) on a weekly
# cron and commits any data changes (master.db + per-owner audit.last_ingestion
# updates). The deploy workflow picks up the resulting push and rebuilds the
# Cloudflare deploy.
#
# The refresh fans out into 4 parallel matrix jobs (one per "bucket" — see
# scripts/refresh.py:select_bucket). Each bucket gets a roughly balanced
# subset of owners weighted by raw-payload page volume, so the four heaviest
# (kendrick-ken / cohen-steven / johnson-greg / sherman-john) land in
# different buckets. Each bucket runs against the same FEC API key with
# MIN_REQUEST_INTERVAL_S=4.0 in scripts/fetch_fec.py — 4 workers × ~4s spacing
# stays under FEC's 1,000 req/hour cap.
#
# Cadence: Monday 12:00 UTC (8am ET / 7am CT). GitHub may delay cron runs by
# 15+ minutes under load; that's acceptable given the 35d/95d freshness
# thresholds documented in the dashboard.

on:
  # PAUSED — the weekly cron is intentionally disabled until the deferred B2
  # classifier reclassify lands. The H4/M2 classifier fixes changed canonical
  # name/contradiction logic, so committed data was scored with the OLD logic.
  # Running an incremental refresh on the cron would ingest NEW-logic rows
  # alongside OLD-logic rows (mixed-logic data) until the full reclassify runs.
  # Re-enable this schedule block only after the reclassify + calibration pass.
  # schedule:
  #   - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      buckets:
        description: 'Comma-separated bucket indexes to run (default: 0,1,2,3). Use a subset for dry-runs.'
        required: false
        default: '0,1,2,3'
      full_refetch:
        description: 'Pass --full-refetch to ingest: re-fetch every cycle from 2000-01-01 ignoring audit.last_ingestion. Use for one-off recovery runs (e.g., backfilling v3 image fields). Heavier than the weekly incremental.'
        required: false
        type: boolean
        default: false
      beneficiaries:
        description: 'Pass --force-refresh to ingest-committee-beneficiaries: re-fetch every committee/cycle ignoring the 30-day freshness gate. Use for the initial Phase 2 backfill (~1054 committees × ~5-15 cycles × FEC throttle). Steady-state weekly runs do not need this.'
        required: false
        type: boolean
        default: false

# Queue overlapping runs rather than cancel — partial refresh state is
# harder to recover from than a delayed full one.
concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Each matrix job gets its own 6h GitHub cap. Setting an explicit
    # timeout < 6h means we fail fast with logs rather than being silently
    # killed at the cap.
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        bucket: [0, 1, 2, 3]
    permissions:
      contents: read
    steps:
      - name: Skip bucket if not in workflow_dispatch input
        id: gate
        run: |
          inputs='${{ github.event.inputs.buckets }}'
          if [ -z "$inputs" ]; then inputs="0,1,2,3"; fi
          if echo ",$inputs," | grep -q ",${{ matrix.bucket }},"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Bucket ${{ matrix.bucket }} not in selected set ($inputs); skipping."
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run refresh bucket ${{ matrix.bucket }}/4
        if: steps.gate.outputs.run == 'true'
        # Per-owner failures are isolated in refresh_all (GOVERNANCE.md §1.9 — try
        # again next time) and surfaced in the summary JSON. We don't want one
        # timed-out owner to throw away the work of the other 8 in this bucket
        # by skipping the artifact upload. continue-on-error lets the job keep
        # going to the upload step. A catastrophic crash still shows up in
        # the step summary; the consolidate job tolerates a missing bucket DB.
        continue-on-error: true
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          extra_args=""
          if [ "${{ github.event.inputs.full_refetch }}" = "true" ]; then
            extra_args="--full-refetch --chunk-by-cycle"
          fi
          python -m scripts.cli refresh --bucket ${{ matrix.bucket }}/4 $extra_args

      - name: Backfill v3 image fields from raw payloads
        # After a full-refetch, fresh raw payloads sit on this runner with the
        # per-transaction image fields. INSERT OR IGNORE in db.insert_donation
        # leaves existing rows alone, so the v3 columns on previously-NULL
        # rows stay NULL unless we explicitly rehydrate them. This step does
        # that — runs per bucket so the populated DB rides into consolidate.
        # Idempotent and cheap on incremental runs (no NULL rows to process).
        if: always() && steps.gate.outputs.run == 'true'
        run: python -m scripts.cli backfill-donation-image-fields

      - name: Upload bucket artifact
        # always(): upload whatever progress we made even if the refresh step
        # reported a non-zero exit (per-owner failure).
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: refresh-bucket-${{ matrix.bucket }}
          path: |
            data/master.db
            owners/*.yaml
            catalog/PROVENANCE_LOG.md
          retention-days: 7
          if-no-files-found: warn

  consolidate:
    needs: refresh
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download bucket artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: refresh-bucket-*

      - name: Merge bucket databases
        run: |
          bucket_dbs=()
          for d in artifacts/refresh-bucket-*; do
            if [ -f "$d/data/master.db" ]; then
              bucket_dbs+=(--bucket-db "$d/data/master.db")
            fi
          done
          if [ ${#bucket_dbs[@]} -eq 0 ]; then
            echo "No bucket DB artifacts found; nothing to consolidate."
            exit 0
          fi
          python -m scripts.merge_buckets --consolidated data/master.db "${bucket_dbs[@]}"

      - name: Adopt per-bucket YAML and log changes
        run: python -m scripts.finalize_matrix --base . --artifacts artifacts/

      - name: Rebuild mockup/data.json
        run: python mockup/build_data.py

      - name: Commit + push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage only what the refresh layer is allowed to touch: master DB,
          # the rebuilt data.json, owner YAMLs (audit.last_ingestion only), and
          # the provenance log. REVIEW_QUEUE.md is no longer tracked — its data
          # lives in the review_queue table inside master.db.
          git add data/master.db mockup/data.json owners/*.yaml catalog/PROVENANCE_LOG.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes from refresh — nothing to commit."
          else
            git commit -m "weekly refresh ($(date -u +%Y-%m-%d))"
            git push
          fi

  committees_refresh:
    # Enrich committees + committee_totals + filings + committee_disbursements_by_recipient
    # for any recipient newly seen or whose last refresh is > FRESHNESS_DAYS (30 days).
    # Runs after consolidate so it sees the merged master.db.
    #
    # Steady-state weekly cost: ~30 min (only stale committees get re-fetched).
    #
    # Initial Phase 2 backfill (workflow_dispatch with beneficiaries=true):
    # the beneficiaries step alone needs 5-17 hours of FEC API time for the
    # full ~1054 committees × ~5-15 cycles. GitHub Actions caps a single job
    # at 6 hours, so the backfill completes incrementally across multiple
    # weekly runs — each subsequent run skips what's already in the 30d
    # freshness window. The timeout-minutes cap matches the refresh job's
    # cap (just under the 6h GHA ceiling) so we fail-fast with logs rather
    # than getting silently killed.
    needs: consolidate
    runs-on: ubuntu-latest
    timeout-minutes: 330
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pull the freshly-pushed master.db from `consolidate` so we enrich
          # against the current state of recipients, not the pre-refresh one.
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest committees (identity + per-cycle totals)
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python -m scripts.cli ingest-committees

      - name: Apply curated external links
        run: python -m scripts.cli apply-committee-external-links

      - name: Ingest filings (real PDF URLs for donation cards)
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        # Batches 50 file_numbers per FEC request. Steady-state ~10s — only
        # filings outside the 30d freshness window get re-fetched, and the
        # weekly cron typically adds ~50-100 new filings, well under the cap.
        run: python -m scripts.cli ingest-filings

      - name: Ingest committee beneficiaries (Schedule B by_recipient)
        # Phase 2 — "Who this committee funded" data. Steady-state weekly cost
        # is ~30 min (only (committee, cycle) pairs outside the 30d freshness
        # window are re-fetched). The initial backfill across ~1054 committees
        # × ~5-15 cycles takes 5-17 hours of FEC API time; triggered via
        # workflow_dispatch with beneficiaries=true. continue-on-error so per-
        # committee FEC timeouts don't kill the rest of the job — same
        # GOVERNANCE.md §1.9 reasoning as the bucket refresh step.
        continue-on-error: true
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          extra_args=""
          if [ "${{ github.event.inputs.beneficiaries }}" = "true" ]; then
            extra_args="--force-refresh"
          fi
          python -m scripts.cli ingest-committee-beneficiaries $extra_args

      - name: Rebuild mockup/data.json with enrichment
        run: python mockup/build_data.py

      - name: Commit + push committee enrichment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master.db mockup/data.json catalog/PROVENANCE_LOG.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No committee enrichment deltas — nothing to commit."
          else
            git commit -m "committees: weekly enrichment ($(date -u +%Y-%m-%d))"
            git push
          fi
